name: Update arcquote prices

# Tygodniowy auto-update cen materiałów dla /arcquote.
# Odpala scraper, a jeśli prices-latest.js się zmienił — commituje go z powrotem.
on:
  schedule:
    - cron: '0 5 * * 1'        # w każdy poniedziałek 05:00 UTC (07:00 CEST)
  workflow_dispatch: {}         # pozwala odpalić ręcznie z zakładki Actions

permissions:
  contents: write               # potrzebne, by zacommitować zaktualizowany plik

concurrency:
  group: update-prices
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run price updater
        run: node arcquote/update-prices.mjs

      - name: Show report
        if: always()
        run: cat arcquote/update-report.txt || true

      - name: Commit if prices changed
        run: |
          git config user.name  "gorweld-bot"
          git config user.email "actions@users.noreply.github.com"
          # update-report.txt zmienia się co przebieg (timestamp) — pilnujemy tylko cen
          if git diff --quiet -- arcquote/prices-latest.js; then
            echo "Ceny bez zmian — nic do commitu."
          else
            git add arcquote/prices-latest.js arcquote/update-report.txt
            git commit -m "arcquote: auto-aktualizacja cen [skip ci]"
            git push
          fi
