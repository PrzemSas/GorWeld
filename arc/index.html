function depositBead(x,y,w){

}
// one "dime" — crescent scale bowed toward travel: dark trailing edge + bright leading ridge
function drawRipple(x,y,w,dx,dy){
  const c=BEADS[bead],P=PROCESS[proc],px=-dy,py=dx;
  const irr = proc==="MMA" ? (Math.random()*0.25+0.85) : 1;
  const bow = w*(proc==="TIG"?0.95:proc==="MIG"?0.45:0.62)*irr;
  sctx.lineCap="round"; sctx.lineJoin="round";

function move(e){ if(isCut())return cutMove(e);

  recEv('move',p.x,p.y,now);

  // keyhole — bright penetration at the leading edge (arc digging in)
  ctx.fillStyle="rgba(255,255,250,0.92)"; ctx.beginPath(); ctx.ellipse(r*0.72,0, r*0.4, r*0.3, 0,0,7); ctx.fill();
  ctx.restore();
  // surface shimmer — light dancing on the liquid
  for(let i=0;i<3;i++){ const a=now/100+i*2.1, sx=x+Math.cos(a)*r*0.45, sy=y+Math.sin(a*1.3)*r*0.32;
    ctx.fillStyle="rgba(255,255,238,"+(0.28+0.22*Math.sin(now/55+i))+")"; ctx.beginPath(); ctx.arc(sx,sy,1.7,0,7); ctx.fill(); }
  ctx.restore();
}
function applyEyeBurn(now,eff){
  const eb=document.getElementById("eyeburn");
  if(eff<=0){ if(stage.style.filter){ stage.style.filter=""; stage.style.transform=""; } eb.style.opacity=0; eyeWarned=false; return; }
  // double vision — overlay a wobbling, shifted copy of the frame on itself
  ctx.save(); ctx.globalAlpha=Math.min(0.5,eff*0.45); ctx.globalCompositeOperation="lighter";
  ctx.drawImage(stage, eff*9*Math.sin(now/140), eff*6*Math.cos(now/110), W, H); ctx.restore();
  // blur + over-exposure + hue swim + sway
  stage.style.filter=`blur(${eff*5}px) brightness(${1+eff*0.7}) contrast(${1+eff*0.4}) saturate(${1+eff*0.6}) hue-rotate(${Math.sin(now/200)*eff*35}deg)`;
  stage.style.transform=`translate(${Math.sin(now/120)*eff*5}px,${Math.cos(now/95)*eff*4}px) scale(${1+eff*0.015})`;
  eb.style.opacity=Math.min(0.45, 0.12+eff*0.2+Math.sin(now/90)*0.05);
  if(!eyeWarned){ eyeWarned=true; showToast(t("t_eye"),"#ffd23f"); }
}

function updateCovBar(now){

  if(baked.length<2 && passIndex===0){ bar.classList.remove("show"); return; }
  bar.classList.add("show");

// ── Render ────────────────────────────────────────────────────────
function frame(now){
  const dtf=lastFrameT?Math.min(0.05,(now-lastFrameT)/1000):0; lastFrameT=now;
  if(welding&&!helmetOn) eyeBurn+=dtf; else eyeBurn=Math.max(0,eyeBurn-dtf*0.6); // eyes recover when you stop / put helmet on
  ctx.clearRect(0,0,W,H);
  ctx.drawImage(plate,0,0,W,H);
  ctx.drawImage(weldbg,0,0,W,H);   // banked lower passes
  ctx.drawImage(seam,0,0,W,H);     // live pass on top
  updateCovBar(now);
  const grav=gVec(),P=PROCESS[proc];

  // smoke (below glow, above plate)
  ctx.save();
  const sk=[];
  for(const s of smoke){ s.x+=s.vx; s.y+=s.vy; s.vx*=0.99; s.r+=0.4; s.life-=s.decay; if(s.life<=0)continue;
    ctx.globalAlpha=s.life*0.14; ctx.fillStyle="#9aa6ad";
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,7); ctx.fill(); sk.push(s); }
  smoke=sk; ctx.restore();

  // cooling trail behind the arc — base metal glowing down white→orange→red→gone
  ctx.save(); ctx.globalCompositeOperation="lighter"; const keep=[];
  for(const m of molten){ const age=now-m.t; if(age>900)continue; m.y+=grav*0.6;
    const col=moltenColor(age),glow=1-age/900;
    const gr=ctx.createRadialGradient(m.x,m.y,0,m.x,m.y,m.r*(1.3+glow*0.7));
    gr.addColorStop(0,col); gr.addColorStop(0.45,col); gr.addColorStop(1,"rgba(0,0,0,0)");
    ctx.globalAlpha=0.45+glow*0.5; ctx.fillStyle=gr; ctx.beginPath(); ctx.arc(m.x,m.y,m.r*(1.3+glow*0.7),0,7); ctx.fill(); keep.push(m); }
  molten=keep; ctx.restore();

  // live molten weld pool fusing into the base metal
  drawPuddle(now);

  // arc + spatter + smoke source
  if(welding&&last){
    if(now-lastSpawn>16){ spawnSparks(last.x,last.y,3+(thick>>1)); spawnSmoke(last.x,last.y); lastSpawn=now; }
    ctx.save(); ctx.globalCompositeOperation="lighter";
    const flick=0.6+Math.random()*0.4,ar=idealHalf*(2.4+Math.random()*0.9);
    const ag=ctx.createRadialGradient(last.x,last.y,0,last.x,last.y,ar);
    ag.addColorStop(0,P.arc); ag.addColorStop(0.3,"rgba(120,200,255,"+flick*0.45+")"); ag.addColorStop(1,"rgba(0,0,0,0)");
    ctx.globalAlpha=flick; ctx.fillStyle=ag; ctx.beginPath(); ctx.arc(last.x,last.y,ar,0,7); ctx.fill(); ctx.restore();
  }

  // sparks
  ctx.save(); ctx.globalCompositeOperation="lighter"; const live=[];
  for(const s of sparks){ s.vy+=0.14; s.vx*=0.99; s.x+=s.vx; s.y+=s.vy; s.life-=s.decay; if(s.life<=0)continue;
    ctx.globalAlpha=s.life; ctx.fillStyle=s.life>0.5?"#fff4cf":(s.life>0.25?"#ffb43c":"#ff5a1e");
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r*(0.5+s.life),0,7); ctx.fill();
    ctx.globalAlpha=s.life*0.4; ctx.fillRect(s.x-s.vx,s.y-s.vy,1,1); live.push(s); }
  sparks=live; ctx.restore();

  // tool in hand (electrode / gun / torch + filler)
  drawTool(now);

  applyEyeBurn(now, Math.max(0, Math.min(1.3, (eyeBurn-2)/3)));  // <2s = nothing, then it gets ugly

  // HELMET — auto-darkening filter
  if(helmetOn){
    ctx.save();
    if(welding&&last){
      const gd=ctx.createRadialGradient(last.x,last.y,idealHalf*1.6,last.x,last.y,Math.max(W,H)*0.55);
      gd.addColorStop(0,"rgba(2,9,7,0)"); gd.addColorStop(0.45,"rgba(2,9,7,0.82)"); gd.addColorStop(1,"rgba(0,3,2,0.97)");
      ctx.fillStyle=gd; ctx.fillRect(0,0,W,H);
      ctx.globalCompositeOperation="overlay"; ctx.fillStyle="rgba(20,70,40,0.18)"; ctx.fillRect(0,0,W,H); // ADF green tint
    } else {
      ctx.fillStyle="rgba(5,12,9,0.34)"; ctx.fillRect(0,0,W,H);
    }
    ctx.restore();
    if(welding&&last && speedFb){ ctx.save(); ctx.font="700 12px 'Segoe UI'"; ctx.textAlign="center";
      ctx.fillStyle=fbGood?"#5fe08a":"#ff9a3c"; ctx.shadowColor="rgba(0,0,0,.85)"; ctx.shadowBlur=4;
      ctx.fillText(speedFb,last.x,last.y-idealHalf-14); ctx.restore(); }
  } else if(welding&&last&&speedFb){ ctx.save(); ctx.font="700 12px 'Segoe UI'"; ctx.textAlign="center";
      ctx.fillStyle=fbGood?"#5fe08a":"#ff9a3c"; ctx.shadowColor="rgba(0,0,0,.85)"; ctx.shadowBlur=4;
      ctx.fillText(speedFb,last.x,last.y-idealHalf-14); ctx.restore(); }

  requestAnimationFrame(frame);
}

// ── Inspection (ISO 5817) ─────────────────────────────────────────
// quality metrics of the CURRENT layer only (combined across layers in inspect)
function passMetrics(){
  const K=seamPts.length; let covered=0; const gaps=[];
  for(let i=0;i<K;i++){ const p=seamPts[i]; let d=1e18; for(const b of baked){ const dd=(b.x-p.x)**2+(b.y-p.y)**2; if(dd<d)d=dd; }
    if(Math.sqrt(d)<grooveHalf*1.6) covered++; else gaps.push(p); }
  const coverage=K?covered/K:0;
  let out=0,narrow=0,wide=0,rs=[];
  for(const b of baked){ if(b.off>grooveHalf+bevelW*0.7) out++; if(b.r<grooveHalf*0.9) narrow++; if(b.r>idealHalf*1.65) wide++; rs.push(b.r); }
  const overflow=baked.length?out/baked.length:0;
  const mean=rs.reduce((a,v)=>a+v,0)/(rs.length||1);
  const evenness=rs.length?Math.max(0,1-(Math.sqrt(rs.reduce((a,v)=>a+(v-mean)**2,0)/rs.length)/mean)*1.4):0;
  const tol=MATERIAL[bead].tol;
  const avgV=speedN?speedSum/speedN:targetPx, spdAcc=Math.max(0,1-Math.abs(avgV-targetPx)/(targetPx*tol));
  const instab=speedN?vVarSum/speedN:0; const porosity=Math.max(0,Math.round((instab/8 + (proc==="MIG"&&spdAcc<0.4?2:0))/tol));
  const spatter=Math.round(spatterCount*PROCESS[proc].sparks/40);
  // crater — the two ends of the seam left unfilled (no bead within reach of an endpoint)
  let endGap=0; for(const e of [seamPts[0],seamPts[K-1]]){ let d=1e18; for(const b of baked){ const dd=(b.x-e.x)**2+(b.y-e.y)**2; if(dd<d)d=dd; } if(Math.sqrt(d)>grooveHalf*1.7) endGap++; }
  return {coverage,overflow,evenness,spdAcc,porosity,spatter,narrow,wide,out,gaps,avgV,endGap};
}
// freeze the finished layer underneath and arm the next one
function bankPass(){
  recEv('bank',0,0,performance.now());
  passLog.push(passMetrics());
  wbctx.drawImage(seam,0,0,W,H); sctx.clearRect(0,0,W,H);
  baked=[]; molten=[]; speedSum=0; speedN=0; vVarSum=0; spatterCount=0; distAcc=0;
  passIndex++; passMul=PASS_W[passPlanArr[passIndex]]||1; recalc();
  const nextType=t("pass_"+passPlanArr[passIndex]), isLast=passIndex===passPlanArr.length-1;
  showToast(isLast? t("t_passlast") : fmt("t_passdone",[passIndex,nextType]), "#5fe08a");
  flashEl.style.opacity="0.32"; setTimeout(()=>flashEl.style.opacity="0",90);
  updateToolHud(); updateInfo();
}
function inspect(){
  if(baked.length<10){ showToast(t("t_layfirst"),"#ff9a3c"); return; }
  const K=seamPts.length;
  const cur=passMetrics(), all=passLog.concat([cur]), n=all.length, avg=k=>all.reduce((a,m)=>a+m[k],0)/n;
  const coverage=avg("coverage"), spdAcc=avg("spdAcc"), evenness=avg("evenness");
  const overflow=Math.max.apply(null,all.map(m=>m.overflow));
  const porosity=all.reduce((a,m)=>a+m.porosity,0), spatter=all.reduce((a,m)=>a+m.spatter,0);
  const narrow=cur.narrow, wide=cur.wide, gaps=cur.gaps, out=cur.out, avgV=cur.avgV;
  const endGap=Math.max.apply(null,all.map(m=>m.endGap));
  const rootCov=(passPlanArr[0]==="root"&&passLog.length)?passLog[0].coverage:1;

  // grade = weighted weld-quality (positives sum to 100) minus defect penalties
  let score = coverage*50          // przetop / wypełnienie grani (najważniejsze)
            + spdAcc*20            // tempo = wkład ciepła
            + evenness*15          // równość lica
            + (1-overflow)*15      // brak podtopień / zwisów
            - porosity*5           // pęcherze
            - (proc==="TIG"?spatter*3:spatter*0.5); // TIG ma być czysty
  score=Math.max(0,Math.min(100,Math.round(score)));

  // PARITY (krok 2): odtwórz tę samą rundę headless i porównaj z wynikiem live.
  if(rec){ rec.liveScore=score; window.__round=rec;
    if(window.ArcSim){ try{ const sr=window.ArcSim.simulate(rec);
      console.log('%c[PARITY]','color:#3cb9ff;font-weight:700','live',score,'· sim',sr.score,'· Δ',score-sr.score, sr);
    }catch(err){ console.warn('[PARITY] sim error',err); } } }

  const D=[];
  if(coverage<0.85) D.push({s:coverage<0.6?"major":"minor",t:fmt("def_pen",[Math.round((1-coverage)*100)])});
  if(narrow/baked.length>0.25) D.push({s:"minor",t:t("def_narrow")});
  if(wide/baked.length>0.2) D.push({s:"minor",t:t("def_wide")});
  if(overflow>0.12) D.push({s:overflow>0.3?"major":"minor",t:fmt("def_undercut",[Math.round(overflow*100)])});
  if(porosity>0) D.push({s:porosity>3?"major":"minor",t:fmt("def_porosity",[porosity])});
  if(spatter>4&&proc!=="TIG") D.push({s:"minor",t:fmt("def_spatter",[spatter])});
  if(evenness<0.6) D.push({s:"minor",t:t("def_uneven")});
  if(endGap>0) D.push({s:endGap>1?"major":"minor",t:t("def_crater")});                                   // unfilled stop/start
  if(passPlanArr[0]==="root"&&rootCov<0.8) D.push({s:"major",t:fmt("def_rootlack",[Math.round(rootCov*100)])}); // weak root layer
  if(D.length===0) D.push({s:"ok",t:t("def_clean")});

  const major=D.some(d=>d.s==="major");
  let iso,isoCol; if(major||score<50){iso=t("iso_reject");isoCol="#ff5a4a";} else if(score>=88){iso=t("iso_B");isoCol="#5fe08a";} else if(score>=72){iso=t("iso_C");isoCol="#ffd23f";} else {iso=t("iso_D");isoCol="#ff9a3c";}
  const letter=score>=90?"A":score>=78?"B":score>=62?"C":score>=45?"D":"F";
  const col=score>=78?"#5fe08a":score>=62?"#ffd23f":score>=45?"#ff9a3c":"#ff5a4a";

  const diff=difficulty(), mat=matCost(), mult=payMult(score);
  let payout=Math.round(mat*mult), jackpot=0;
  if(!jobSettled){                                                       // settle the job once
    if(score>=90 && diff>=7 && pool>0) jackpot=Math.round(pool*0.5);     // LEGENDARNA A cracks the shop pool
    const won=payout+jackpot; gw+=won; pool-=won; jobSettled=true; saveWallet(); updateWallet();
  }
  const net=payout+jackpot-jobCost;
  lastReport={score,letter,iso,proc,posKey,thick,coverage,spdAcc,evenness,avgV,diff,cost:jobCost,payout:payout+jackpot,jackpot,net,balance:gw,material:MATERIAL[bead].name[lang]};

  document.getElementById("rLetter").textContent=letter; document.getElementById("rLetter").style.color=col;
  const isoEl=document.getElementById("rIso"); isoEl.textContent="ISO 5817 · "+iso; isoEl.style.background=isoCol+"22"; isoEl.style.color=isoCol;
  document.getElementById("rPct").textContent=score+"% · "+proc+" · "+POSITIONS[posKey].lbl+" · "+thick+"mm";
  document.getElementById("rCov").textContent=Math.round(coverage*100)+"%";
  document.getElementById("rSpd").textContent=Math.round(spdAcc*100)+"% ("+(avgV/PX_PER_MM).toFixed(1)+"/"+(targetPx/PX_PER_MM).toFixed(1)+" mm/s)";
  document.getElementById("rEven").textContent=Math.round(evenness*100)+"%";
  const rb=document.getElementById("rReward"), tier=valueTier(diff);
  const ecoTail='<small><b style="color:'+tier.col+'">'+tier.name+'</b> ×'+diff.toFixed(1)+' · '+t("eco_cost")+' '+jobCost+' → '+t("eco_net")+' <b style="color:'+(net>=0?'#5fe08a':'#ff5a4a')+'">'+(net>=0?'+':'')+net+' GW</b> · '+t("eco_bal")+' '+gw+'</small>';
  if(payout+jackpot>0) rb.innerHTML='🏆 +'+(payout+jackpot)+' GW'+(jackpot?' <span style="color:#ff8a3c">💥 '+t("eco_jack")+' +'+jackpot+'</span>':'')+ecoTail;
  else rb.innerHTML=t("rew_zero")+ecoTail;
  const ul=document.getElementById("rDefects"); ul.innerHTML="";
  for(const d of D){ const li=document.createElement("li");
    li.innerHTML='<span class="sev '+d.s+'">'+(d.s==="ok"?t("sev_ok"):d.s==="major"?t("sev_major"):t("sev_minor"))+'</span><span>'+d.t+'</span>'; ul.appendChild(li); }

  // annotated zoom on worst region
  const worst = gaps.length?gaps[Math.floor(gaps.length/2)] : (out?baked.find(b=>b.off>grooveHalf+bevelW*0.7):seamPts[Math.floor(K/2)]);
  drawZoom(worst.x,worst.y, D.find(d=>d.s!=="ok"));
  openModal("repModal");
  maybeCompleteCoupon(score);
}
function drawZoom(cx,cy,worst){

  z.fillStyle="#0a0d0f"; z.fillRect(0,0,zw,zh);
  z.save(); z.translate(zw/2,zh/2); z.scale(sc,sc); z.translate(-cx,-cy);

  if(score>=c.req && (!progress.done[c.id] || progress.done[c.id]<score)){

let actx,master,noiseSrc,buzzOsc,bpFilter,crackleTimer,soundOn=true;
function initAudio(){ if(actx)return;
  actx=new (AudioContext||webkitAudioContext)(); master=actx.createGain(); master.gain.value=0; master.connect(actx.destination);
  const buf=actx.createBuffer(1,actx.sampleRate*2,actx.sampleRate),d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=Math.random()*2-1;
  noiseSrc=actx.createBufferSource(); noiseSrc.buffer=buf; noiseSrc.loop=true;
  bpFilter=actx.createBiquadFilter(); bpFilter.type="bandpass"; bpFilter.Q.value=0.7; noiseSrc.connect(bpFilter); bpFilter.connect(master);
  buzzOsc=actx.createOscillator(); buzzOsc.type="sawtooth"; const bg=actx.createGain(); bg.gain.value=0.18;
  const lp=actx.createBiquadFilter(); lp.type="lowpass"; lp.frequency.value=600; buzzOsc.connect(lp); lp.connect(bg); bg.connect(master);
  noiseSrc.start(); buzzOsc.start();
}
function arcOn(){ if(!soundOn)return; initAudio(); if(actx.state==="suspended")actx.resume();
  const P=PROCESS[proc]; bpFilter.frequency.value=P.hiss; buzzOsc.frequency.value=P.buzz;
  master.gain.cancelScheduledValues(actx.currentTime); master.gain.setTargetAtTime(0.22,actx.currentTime,0.02);
  clearInterval(crackleTimer); crackleTimer=setInterval(()=>{ if(!master)return;
    master.gain.setTargetAtTime(0.11+Math.random()*P.crackDepth,actx.currentTime,0.01);
    buzzOsc.frequency.setTargetAtTime(P.buzz*(0.85+Math.random()*0.3),actx.currentTime,0.02); },P.crackInt);
}
function arcIntensity(v){ if(master&&soundOn) master.gain.setTargetAtTime(0.12+v*0.18,actx.currentTime,0.03); }
function arcOff(){ clearInterval(crackleTimer); if(master) master.gain.setTargetAtTime(0,actx.currentTime,0.05); }

let cutHeat=0, pierced=false, cutDevSum=0, cutDevN=0;

function kerfPx(){ return proc==="PLASMA" ? 3.2 : 5 + thick*0.45; }
function cutLineY(){ return H*0.62; }
function buildCutPiece(){
  recalc(); seamPts=[]; baked=[]; cutHeat=0; pierced=false; cutDevSum=0; cutDevN=0;
  const y=cutLineY(), x0=W*0.18, x1=W*0.82;

}
function drawCutPlate(){
  pctx.clearRect(0,0,W,H);
  const y=cutLineY(), x0=W*0.18-40, x1=W*0.82+40, ph=82;
  const bg=pctx.createRadialGradient(W/2,H*0.4,60,W/2,H/2,Math.max(W,H)*0.8);
  bg.addColorStop(0,"rgba(20,24,28,.30)"); bg.addColorStop(1,"rgba(8,10,12,.72)"); pctx.fillStyle=bg; pctx.fillRect(0,0,W,H);
  const tint = bead==="alu"?["#9aa0a6","#6e747a","#54595e"] : bead==="ss"?["#aeb6bd","#7c848b","#5a6066"] : ["#7a828a","#565d64","#3c4147"];
  const g=pctx.createLinearGradient(0,y-ph,0,y+ph);
  g.addColorStop(0,tint[0]); g.addColorStop(0.5,tint[1]); g.addColorStop(1,tint[2]);
  pctx.save(); pctx.shadowColor="rgba(0,0,0,.5)"; pctx.shadowBlur=18; pctx.shadowOffsetY=6;
  pctx.fillStyle=g; pctx.fillRect(x0,y-ph,x1-x0,ph*2); pctx.restore();
  pctx.strokeStyle="rgba(255,255,255,.12)"; pctx.lineWidth=1; pctx.strokeRect(x0,y-ph,x1-x0,ph*2);
  pctx.save(); pctx.setLineDash([10,7]); pctx.strokeStyle="rgba(255,174,60,.65)"; pctx.lineWidth=2;
  pctx.beginPath(); pctx.moveTo(seamPts[0].x,y); pctx.lineTo(seamPts[seamPts.length-1].x,y); pctx.stroke(); pctx.restore();
  pctx.fillStyle="#ff5a1e"; pctx.beginPath(); pctx.arc(seamPts[0].x,y,5,0,7); pctx.fill();
  pctx.fillStyle="rgba(255,255,255,.85)"; pctx.font="700 9px 'Segoe UI'"; pctx.textAlign="center"; pctx.fillText("START",seamPts[0].x,y-12);
}
function cutStart(e){
  if(modalOpen())return; const p=pos(e); cursor.x=p.x; cursor.y=p.y; cursor.seen=true;
  if(!onPlate(p.x,p.y)){ showToast(t("t_strikeoff"),"#ff9a3c"); e.preventDefault(); return; }
  if(proc==="CUT" && bead!=="steel"){ showToast(t("t_cut_steelonly"),"#ff5a4a"); e.preventDefault(); return; }
  if(!jobPaid){ const price=jobPrice();
    if(gw<price){ showToast(t("t_nofunds"),"#ff5a4a"); e.preventDefault(); return; }
    gw-=price; burned+=CONSUMABLE[proc]; pool+=matCost(); jobCost=price; jobPaid=true; saveWallet(); updateWallet();
    showToast(fmt("t_bought",[price]),"#ffae3c"); }
  welding=true; last=p; const t0=performance.now(); lastT=t0; vEMA=targetPx;
  cutHeat=0; pierced=(proc==="PLASMA");
  if(!rec)recStart(); recEv('down',p.x,p.y,t0); arcOn(); arcIntensity(0.3);
  showToast(proc==="PLASMA"?t("t_cut_pierced"):t("t_cut_preheat"), proc==="PLASMA"?"#1fd6e3":"#ffae3c");
  e.preventDefault();
}
function cutMove(e){
  if(!welding)return; const p=pos(e),now=performance.now(); cursor.x=p.x; cursor.y=p.y; cursor.seen=true;
  recEv('move',p.x,p.y,now);
  if(last){
    const ddx=p.x-last.x,ddy=p.y-last.y,dist=Math.hypot(ddx,ddy),dt=Math.max(8,now-lastT);
    const inst=dist/(dt/1000),prev=vEMA; vEMA=vEMA*0.7+inst*0.3; vVarSum+=Math.abs(vEMA-prev);
    if(dist){ ux=ddx/dist; uy=ddy/dist; }
    const k=kerfPx();
    if(!pierced){
      const ns0=nearestSeam(p.x,p.y);
      if(ns0.d<k*3 && dist<6){ cutHeat+=dt/1000/0.9; arcIntensity(0.3+Math.min(0.5,cutHeat*0.4));
        molten.push({x:p.x,y:p.y,r:idealHalf*0.9,t:now}); }
      if(cutHeat>=1){ pierced=true; showToast(t("t_cut_pierced"),"#1fd6e3"); }
    } else {
      const step=Math.max(2,k*0.7),n=Math.max(1,Math.floor(dist/step));
      for(let i=1;i<=n;i++){ const x=last.x+ddx*(i/n),y=last.y+ddy*(i/n);
        if(!onPlate(x,y)) continue; const ns=nearestSeam(x,y);
        depositKerf(x,y,ns,k); molten.push({x,y,r:k,t:now}); cutDevSum+=ns.d; cutDevN++; }
      arcIntensity(Math.min(1,dist/14));
    }
    speedSum+=vEMA; speedN++; speedFb=feedback();
  }
  last=p; lastT=now; e.preventDefault();
}
function depositKerf(x,y,ns,k){
  const sx=x+(ns.x-x)*0.55, sy=y+(ns.y-y)*0.55;
  pctx.save(); pctx.globalCompositeOperation="destination-out"; pctx.beginPath(); pctx.arc(sx,sy,k,0,7); pctx.fill(); pctx.restore();
  sctx.save(); sctx.globalCompositeOperation="lighter"; sctx.fillStyle="rgba(255,110,30,.16)";
  sctx.beginPath(); sctx.arc(sx,sy,k*1.7,0,7); sctx.fill(); sctx.restore();
  baked.push({x:sx,y:sy,r:k,off:ns.d});
}
function cutCoverage(){ if(!seamPts.length||!baked.length) return 0; const k=kerfPx(); let c=0;
  for(const pt of seamPts){ let d=1e18; for(const b of baked){ const dd=(b.x-pt.x)**2+(b.y-pt.y)**2; if(dd<d)d=dd; } if(Math.sqrt(d)<k*1.8) c++; }
  return c/seamPts.length; }
function cutEnd(){
  if(welding&&last) recEv('up',last.x,last.y,performance.now());
  welding=false; last=null; speedFb=""; arcOff();
  if(baked.length>=10 && cutCoverage()>=0.8) cutInspect();
}
function cutInspect(){
  if(baked.length<10){ showToast(t("t_layfirst"),"#ff9a3c"); return; }
  const coverage=cutCoverage(), k=kerfPx();
  const avgDev=cutDevN?cutDevSum/cutDevN:0;
  const straight=Math.max(0,Math.min(1,1-avgDev/(k*2.2)));
  const tol=MATERIAL[bead].tol, avgV=speedN?speedSum/speedN:targetPx;
  const spdAcc=Math.max(0,1-Math.abs(avgV-targetPx)/(targetPx*tol));
  const fast=avgV>targetPx*(1+0.45*tol), slow=avgV<targetPx*(1-0.45*tol);
  let score=Math.max(0,Math.min(100,Math.round(coverage*55 + spdAcc*25 + straight*20)));
  const D=[];
  if(coverage<0.9) D.push({s:coverage<0.7?"major":"minor",t:fmt("cd_incomplete",[Math.round((1-coverage)*100)])});
  if(slow) D.push({s:"minor",t:t("cd_wide")});
  if(fast) D.push({s:(coverage<0.8?"major":"minor"),t:t("cd_dross")});
  if(straight<0.6) D.push({s:straight<0.4?"major":"minor",t:t("cd_dev")});
  if(D.length===0) D.push({s:"ok",t:t("cd_clean")});
  const major=D.some(d=>d.s==="major");
  let iso,isoCol; if(major||score<50){iso=t("iso_reject");isoCol="#ff5a4a";} else if(score>=88){iso=t("iso_B");isoCol="#5fe08a";} else if(score>=72){iso=t("iso_C");isoCol="#ffd23f";} else {iso=t("iso_D");isoCol="#ff9a3c";}
  const letter=score>=90?"A":score>=78?"B":score>=62?"C":score>=45?"D":"F";
  const col=score>=78?"#5fe08a":score>=62?"#ffd23f":score>=45?"#ff9a3c":"#ff5a4a";
  const diff=(proc==="PLASMA"?1.3:1.1)*(bead==="alu"?1.6:bead==="ss"?1.3:1.0)*(1+thick*0.05);
  const mat=matCost(), mult=payMult(score); let payout=Math.round(mat*mult),jackpot=0;
  if(!jobSettled){ if(score>=90 && diff>=1.6 && pool>0) jackpot=Math.round(pool*0.4);
    const won=payout+jackpot; gw+=won; pool-=won; jobSettled=true; saveWallet(); updateWallet(); }
  const net=payout+jackpot-jobCost;
  lastReport={score,letter,iso,proc,posKey,thick,coverage,spdAcc,evenness:straight,avgV,diff,cost:jobCost,payout:payout+jackpot,jackpot,net,balance:gw,material:MATERIAL[bead].name[lang]};
  document.getElementById("rLetter").textContent=letter; document.getElementById("rLetter").style.color=col;
  const isoEl=document.getElementById("rIso"); isoEl.textContent="ISO 9013 · "+iso; isoEl.style.background=isoCol+"22"; isoEl.style.color=isoCol;
  document.getElementById("rPct").textContent=score+"% · "+(proc==="PLASMA"?"PLAZMA":"TLEN")+" · "+t("cut_word")+" · "+thick+"mm";
  document.getElementById("rCov").textContent=Math.round(coverage*100)+"%";
  document.getElementById("rSpd").textContent=Math.round(spdAcc*100)+"% ("+(avgV/PX_PER_MM).toFixed(1)+"/"+(targetPx/PX_PER_MM).toFixed(1)+" mm/s)";
  document.getElementById("rEven").textContent=Math.round(straight*100)+"%";
  const rb=document.getElementById("rReward"), tier=valueTier(diff);
  const ecoTail='<small><b style="color:'+tier.col+'">'+tier.name+'</b> ×'+diff.toFixed(1)+' · '+t("eco_cost")+' '+jobCost+' → '+t("eco_net")+' <b style="color:'+(net>=0?'#5fe08a':'#ff5a4a')+'">'+(net>=0?'+':'')+net+' GW</b> · '+t("eco_bal")+' '+gw+'</small>';
  if(payout+jackpot>0) rb.innerHTML='🏆 +'+(payout+jackpot)+' GW'+(jackpot?' <span style="color:#ff8a3c">💥 '+t("eco_jack")+' +'+jackpot+'</span>':'')+ecoTail;
  else rb.innerHTML=t("rew_zero")+ecoTail;
  const ul=document.getElementById("rDefects"); ul.innerHTML="";
  for(const d of D){ const li=document.createElement("li");
    li.innerHTML='<span class="sev '+d.s+'">'+(d.s==="ok"?t("sev_ok"):d.s==="major"?t("sev_major"):t("sev_minor"))+'</span><span>'+d.t+'</span>'; ul.appendChild(li); }
  const mid=seamPts[Math.floor(seamPts.length/2)]; drawZoom(mid.x,mid.y, D.find(d=>d.s!=="ok"));
  openModal("repModal");
}
document.getElementById("pricing").onclick=()=>{ document.getElementById("priceFrame").src="cennik.html?l="+lang+"&t="+Date.now(); openModal("priceModal"); };
document.getElementById("priceClose").onclick=()=>closeModal("priceModal");

  for(const c of [stage,plate,seam,weldbg]){ c.width=W*DPR; c.height=H*DPR; }
