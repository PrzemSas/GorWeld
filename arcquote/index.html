  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{margin:0;background:linear-gradient(rgba(12,15,18,.78),rgba(12,15,18,.78)), var(--logo) center center / min(92vmin,860px) no-repeat fixed, var(--bg);color:var(--txt);font:15px/1.5 system-ui,Segoe UI,Roboto,sans-serif;touch-action:manipulation;padding-bottom:calc(64px + var(--safe-b))}
  input,select,button{font:inherit}
  #stickyBar{display:none;position:sticky;top:0;z-index:20;align-items:center;justify-content:space-between;gap:10px;padding:10px 14px;padding-top:calc(10px + var(--safe-t));background:rgba(12,15,18,.92);border-bottom:1px solid var(--line);backdrop-filter:blur(10px)}
  #stickyBar .sb-brand{font-size:11px;color:var(--dim);letter-spacing:.5px}
  #stickyBar .sb-brand b{color:var(--cy)}
  #stickyTotal{font-size:22px;font-weight:800;color:var(--or);font-variant-numeric:tabular-nums;white-space:nowrap}
  header{padding:18px 22px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:12px;background:linear-gradient(90deg,#141a1f,#0c0f12)}
  header h1{font-size:18px;margin:0;letter-spacing:.5px}
  header .tag{color:var(--cy);font-weight:700}
  header small{color:var(--dim);display:none}
  #langBtn{margin:0 0 0 auto;padding:8px 14px;font-size:12px;min-height:44px}
  .tabs{display:none;position:sticky;top:0;z-index:15;grid-template-columns:1fr 1fr;gap:0;background:var(--panel);border-bottom:1px solid var(--line);padding-top:var(--safe-t)}
  .tabs button{background:transparent;border:none;color:var(--dim);padding:14px 10px;font-weight:700;font-size:13px;letter-spacing:.3px;border-bottom:3px solid transparent;min-height:48px}
  .tabs button.on{color:var(--cy);border-bottom-color:var(--cy);background:rgba(45,212,191,.06)}
  .wrap{max-width:1080px;margin:0 auto;padding:22px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:18px}
  .card h2{margin:0 0 14px;font-size:14px;text-transform:uppercase;letter-spacing:1px;color:var(--cy)}
  label{display:block;font-size:12px;color:var(--dim);margin:12px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  select,input[type=number],input[type=text]{width:100%;padding:12px 14px;min-height:48px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--txt);font-size:16px}

  .hi-line.bad{background:rgba(245,158,11,.10);border-color:var(--or)}
  table{width:100%;border-collapse:collapse;margin-top:8px;font-size:14px}
  .breakdown-cards{display:none;gap:8px;margin-top:10px}
  .b-card{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;font-size:14px}

  .b-card b{color:var(--txt);font-variant-numeric:tabular-nums;white-space:nowrap}
  .b-card.tot{border-color:var(--cy);background:rgba(45,212,191,.08)}
  .b-card.tot b{color:var(--or);font-size:17px}
  td{padding:7px 4px;border-bottom:1px solid var(--line)}
  td:last-child{text-align:right;font-variant-numeric:tabular-nums}
  .tot td{border-top:2px solid var(--cy);border-bottom:none;font-weight:800;font-size:16px;padding-top:12px}
  .tot td:last-child{color:var(--or)}
  .hint{font-size:12px;color:var(--dim);margin-top:6px;line-height:1.45}
  .src-note{font-size:11px;color:var(--dim);margin-top:14px;border-top:1px dashed var(--line);padding-top:10px;line-height:1.5}
  .badge{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(34,197,94,.15);color:var(--grn);margin-left:6px}
  .save{font-size:11px;color:var(--or)}
  button{background:var(--cy);color:#04201c;border:none;padding:12px 16px;border-radius:10px;font-weight:700;cursor:pointer;font-size:14px;margin-top:14px;min-height:48px}
  button.ghost{background:transparent;color:var(--cy);border:1px solid var(--cy)}
  button:active{transform:translateY(1px)}
  .desk-actions{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px}
  .desk-actions button{margin-top:0;flex:1;min-width:120px}
  details{margin-top:14px}
  summary{cursor:pointer;color:var(--cy);font-size:13px;padding:8px 0;min-height:44px;display:flex;align-items:center}
  .price-edit{display:grid;grid-template-columns:1fr 100px;gap:8px;align-items:center;margin:6px 0;font-size:13px}
  .price-edit input{min-height:44px;padding:8px}
  .warn{color:var(--or)}
  .band{font-size:13px;margin:2px 0 12px;color:var(--dim);line-height:1.5;padding:12px;border-radius:10px;background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.12)}
  .band b{color:var(--cy)}
  footer{max-width:1080px;margin:0 auto;padding:18px 22px 34px;color:var(--dim);font-size:11px;line-height:1.6;border-top:1px solid var(--line)}
  footer b{color:var(--cy)}
  #mobBar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:30;grid-template-columns:repeat(5,1fr);gap:4px;padding:8px 8px calc(8px + var(--safe-b));background:rgba(12,15,18,.94);border-top:1px solid var(--line);backdrop-filter:blur(12px)}
  #mobBar button{margin:0;min-height:48px;font-size:20px;padding:8px;border-radius:10px}
  #toast{position:fixed;left:50%;bottom:calc(76px + var(--safe-b));transform:translateX(-50%) translateY(12px);opacity:0;pointer-events:none;z-index:40;padding:10px 18px;border-radius:10px;background:rgba(20,26,31,.95);border:1px solid var(--line);color:var(--txt);font-size:13px;font-weight:600;transition:opacity .2s,transform .2s;max-width:92vw;text-align:center}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .hist-item{display:flex;flex-direction:column;gap:8px;padding:12px 14px;margin-bottom:8px;background:var(--panel2);border:1px solid var(--line);border-radius:10px}
  .hist-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .hist-amt{font-size:18px;font-weight:800;color:var(--or);white-space:nowrap}
  .hist-meta{font-size:12px;color:var(--dim);line-height:1.45;flex:1}
  .hist-date{font-size:11px;color:var(--dim)}
  .hist-actions{display:flex;gap:8px}
  .hist-actions button{margin:0;min-height:40px;padding:8px 12px;font-size:13px;flex:1}
  .hist-preview{font-size:11px;color:var(--dim);white-space:pre-wrap;max-height:0;overflow:hidden;transition:max-height .25s ease;line-height:1.45}
  .hist-item.open .hist-preview{max-height:220px;margin-top:4px;padding-top:8px;border-top:1px dashed var(--line)}
  .panel-hist{display:none}
  .hist-clear{margin-top:8px;width:100%}
  .param-box{margin-top:14px;padding:14px;border-radius:10px;background:var(--panel2);border:1px solid rgba(45,212,191,.25)}
  .param-head{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:8px;margin-bottom:10px}
  .param-head span{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--cy);font-weight:700}
  .param-head select{flex:1;min-width:140px;min-height:40px;padding:8px 10px;font-size:13px;margin:0;background:var(--panel);border:1px solid var(--line);border-radius:8px;color:var(--txt)}
  .param-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .param-item{padding:10px 12px;background:rgba(12,15,18,.4);border:1px solid var(--line);border-radius:8px;font-size:12px}
  .param-item span{display:block;color:var(--dim);margin-bottom:3px;text-transform:uppercase;letter-spacing:.4px;font-size:10px}
  .param-item b{color:var(--txt);font-size:14px;font-variant-numeric:tabular-nums;line-height:1.3}
  .param-note{font-size:11px;color:var(--dim);margin-top:10px;line-height:1.45}
  .panel-wps{display:none}
  .wps-summary{font-size:13px;color:var(--dim);line-height:1.5;padding:10px 12px;background:rgba(12,15,18,.35);border-radius:8px;margin-bottom:12px}
  .wps-summary b{color:var(--txt)}
  .wps-section{margin-top:14px;padding:12px 14px;background:var(--panel2);border:1px solid var(--line);border-radius:10px}
  .wps-section h3{margin:0 0 8px;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--cy)}
  .wps-section p{margin:0;font-size:13px;color:var(--dim);line-height:1.5}
  .wps-pass{display:flex;gap:10px;padding:10px 12px;margin-bottom:6px;background:rgba(12,15,18,.4);border:1px solid var(--line);border-radius:8px;font-size:13px;align-items:flex-start}
  .wps-pass:last-child{margin-bottom:0}
  .wps-pass .tag{flex-shrink:0;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:800;text-transform:uppercase;background:rgba(45,212,191,.12);color:var(--cy)}
  .wps-pass .body{flex:1;color:var(--dim);line-height:1.45}
  .wps-pass .body b{color:var(--txt)}
  .wps-steps{list-style:none;margin:0;padding:0;font-size:13px;color:var(--dim)}
  .wps-steps li{padding:6px 0;border-bottom:1px dashed var(--line);line-height:1.4}
  .wps-steps li:last-child{border:none}
  .wps-thermal .warn-item{color:var(--or);font-weight:600}
  .wps-thermal .ok-item{color:var(--grn)}
  #wpsCopyBtn{width:100%;margin-top:14px}
  @media(max-width:840px){
    html,body{overflow-x:hidden;max-width:100vw}
    body{padding-bottom:calc(72px + var(--safe-b))}
    #stickyBar,.tabs,#mobBar{display:flex}
    .tabs{display:grid;grid-template-columns:repeat(4,1fr)}
    .tabs button{font-size:11px;padding:12px 6px}
    body.tab-params .panel-wps,body.tab-params .panel-quote,body.tab-params .panel-hist{display:none}
    body.tab-wps .panel-params,body.tab-wps .panel-quote,body.tab-wps .panel-hist{display:none}
    body.tab-wps .panel-wps{display:block}
    body.tab-quote .panel-params,body.tab-quote .panel-wps,body.tab-quote .panel-hist{display:none}
    body.tab-hist .panel-params,body.tab-hist .panel-quote,body.tab-hist .panel-wps{display:none}
    body.tab-hist .panel-hist{display:block}
    .hist-desktop{display:none!important}
    header small{display:none}
    header{padding:14px 16px;padding-top:calc(14px + var(--safe-t))}
    .wrap{padding:10px 12px;gap:10px;grid-template-columns:1fr;width:100%;max-width:100%;box-sizing:border-box}
    .wrap>.card{grid-column:1/-1;width:100%;min-width:0;box-sizing:border-box}
    .row{grid-template-columns:1fr}
    body.tab-params .panel-quote{display:none}
    body.tab-quote .panel-params{display:none}
    table.breakdown-table{display:none}
    .breakdown-cards{display:grid}
    .desk-actions{display:none}
    .result{font-size:36px}
    .param-grid{grid-template-columns:1fr}
    footer{padding-bottom:calc(24px + var(--safe-b))}
  }
  @media(min-width:841px){
    .wrap{grid-template-columns:1fr 1fr}
    .panel-wps{grid-column:1/-1;display:block!important}
    body.tab-params .panel-quote,body.tab-quote .panel-params{display:block}
    #tabWps,#tabHist{display:none}
    body.tab-hist .panel-params,body.tab-hist .panel-quote{display:block}
    body.tab-wps .panel-params,body.tab-wps .panel-quote{display:block}
  }
  @media print{
    #stickyBar,.tabs,#mobBar,#toast,#langBtn,.desk-actions button.ghost-mob{display:none!important}
    body{padding:0}
    .wrap{grid-template-columns:1fr 1fr}
    .panel-params,.panel-quote,.panel-wps{display:block!important}
    .panel-wps{grid-column:1/-1}
  }
  .brand-logo{width:48px;height:48px;flex:0 0 auto;background:var(--logo) center/contain no-repeat;filter:drop-shadow(0 1px 3px rgba(0,0,0,.5))}
</style>

<div id="stickyBar">

</div>

const POS_SPD_MUL={1:1.0,2:0.95,3:0.85,4:0.75,5:0.65}; // trudniejsza pozycja = wolniej
const WELD_EFF_SAW=0.95;
const WIRE_DIA={
  MAG:[[2,0.8],[4,1.0],[8,1.2],[15,1.6],[30,2.0],[999,2.4]],
  FCAW:[[5,1.2],[10,1.6],[20,2.0],[999,2.4]],
  'MIG-Al':[[3,1.0],[6,1.2],[12,1.6],[25,2.0],[999,2.4]]
};
const ELEC_DIA=[[2,2.5],[4,3.2],[8,4.0],[12,5.0],[20,6.0],[999,8.0]];
const TIG_W=[[2,1.6],[4,2.4],[8,3.2],[999,3.2]];
const TIG_ROD=[[1.5,1.6],[3,2.0],[6,2.4],[999,3.2]];
const SAW_WIRE=[[8,2.4],[20,3.2],[40,4.0],[999,5.0]];
const SAW_VOLT=[[10,28],[25,32],[999,36]];
const SAW_AMP=[[8,300],[15,450],[25,600],[50,800],[999,1000]];
const WFS_TABLE={
  MAG:[[80,5],[120,7],[160,9],[200,12]],
  FCAW:[[100,6],[150,9],[200,12],[250,15]],
  'MIG-Al':[[80,5],[120,7],[160,9],[200,11]]
};
const GAS_FOR={
  MAG:{name:{pl:'Ar+CO₂ 82/18 (M21)',en:'Ar+CO₂ 82/18 (M21)'},flow:12},
  FCAW:{name:{pl:'Ar+CO₂ lub samoosłonowy',en:'Ar+CO₂ or self-shielded'},flow:18},
  TIG:{name:{pl:'Argon czysty (I1)',en:'Pure argon (I1)'},flow:8},
  'MIG-Al':{name:{pl:'Argon czysty (I1)',en:'Pure argon (I1)'},flow:15},
  SS:{name:{pl:'Ar+2% O₂ lub Ar+He (M12)',en:'Ar+2% O₂ or Ar+He (M12)'},flow:12}
};

function tableLookup(tbl,t){for(const [lo,hi,v] of tbl)if(lo<=t&&t<=hi)return v;return null;}
function lookMax(tbl,t){for(const r of tbl)if(t<=r[0])return r[1];return tbl[tbl.length-1][1];} // tabele [max,wartość]
function rng(mid,frac,step){ if(mid==null)return mid; const lo=Math.round(mid*(1-frac)/step)*step, hi=Math.round(mid*(1+frac)/step)*step; return lo===hi?String(+(+mid).toFixed(2)):lo+'–'+hi; } // środek → zakres „od–do"
function gasFor(method,matKey){
  if(method.code==='TIG'||method.code==='MIG-Al')return GAS_FOR.TIG;
  if(method.code==='FCAW')return GAS_FOR.FCAW;
  if(matKey==='nierdzewka')return GAS_FOR.SS;
  return GAS_FOR.MAG;
}
function fillerLabel(mat,method){
  const t=T[LANG], L=t.priceLabels;
  const k=method.type==='elec'?mat.elec:(method.type==='flux'?'drut_fluxcored_kg':mat.wire);
  return (L[k]||'').replace(/ \[.*\]/,'').replace(/ \[.*$/,'');
}
function passPlan(jointKey,thick){
  const j=JOINTS[jointKey]||JOINTS.butt;
  if(!j.bevel) return thick<=8?['cap']:['root','cap'];
  if(thick<=3) return ['cap'];
  if(thick<=5) return ['root','cap'];
  if(thick<=12) return ['root','fill','cap'];
  if(thick<=25) return ['root','fill','fill','cap'];
  return ['root','fill','fill','fill','cap'];
}
function edgePrep(jointKey,thick){
  const j=JOINTS[jointKey]||JOINTS.butt;
  if(!j.bevel) return {edge:{pl:'bez ukosu (pachwina/naroże)',en:'no bevel (fillet/corner)'},angle:'—',prep:0};
  return EDGE_RANGES.find(r=>thick<=r.max)||EDGE_RANGES[EDGE_RANGES.length-1];
}
function arcElectrics(method,thick,posKey){
  const proc=method.proc||'MAG', pos=POSITIONS[posKey];
  let amps, volts;
  if(method.code==='SAW'){
    amps=Math.round(lookMax(SAW_AMP,thick)*(POS_AMP_MUL[pos.st]||1));
    volts=lookMax(SAW_VOLT,thick);
  }else{
    const aBase=tableLookup(AMP_TABLES[proc],thick);
    volts=tableLookup(VOLT_TABLES[proc],thick);
    if(aBase==null||volts==null)return null;
    amps=Math.round(aBase*(POS_AMP_MUL[pos.st]||1));
  }
  const speedBase=method.code==='SAW'?SAW_SPEED:(WELD_SPEED[proc]||2.5);
  const travelMmS=+((speedBase)*(POS_SPD_MUL[pos.st]||1)).toFixed(1);
  const eff=method.code==='SAW'?WELD_EFF_SAW:(WELD_EFF[proc]||0.8);
  const hi=Math.round(volts*amps*eff/(travelMmS*1000)*1000)/1000;
  return {amps,volts,travelMmS,hi,eff};
}
function getWeldParams(method,thick,posKey,matKey,jointKey){
  const mat=MATERIALS[matKey];
  const passes=passPlan(jointKey||'butt',thick).length;
  const arc=arcElectrics(method,thick,posKey);
  if(!arc)return null;
  const {amps,volts,travelMmS}=arc;
  const travelCmMin=Math.round(travelMmS*6);
  const out={amps,volts,travelMmS,travelCmMin,passes,hi:arc.hi,code:method.code};
  // polaryzacja wg metody (TIG stal=DCEN, alu=AC; MMA wg elektrody; reszta DCEP)
  out.polarity = method.code==='TIG' ? (matKey==='aluminium'?'AC':'DC− (DCEN)')
               : method.code==='MMA' ? (LANG==='pl'?'DC+ / AC (wg elektrody)':'DC+ / AC (per electrode)')
               : 'DC+ (DCEP)';
  const gas=gasFor(method,matKey);
  if(method.code==='TIG'){
    out.tungDia=lookMax(TIG_W,thick);
    out.rodDia=lookMax(TIG_ROD,thick);
    out.gas=gas.name[LANG]; out.gasFlow=gas.flow;
    out.filler=fillerLabel(mat,method);
  }else if(method.code==='SAW'){
    out.wireDia=lookMax(SAW_WIRE,thick);
    out.filler=fillerLabel(mat,method);
    out.fluxNote=T[LANG].sawNote;
  }else if(method.type==='elec'){
    out.elecDia=lookMax(ELEC_DIA,thick);
    out.filler=fillerLabel(mat,method);
  }else if(method.type==='wire'||method.type==='flux'){
    out.wireDia=lookMax(WIRE_DIA[method.code]||WIRE_DIA.MAG,thick);
    out.wfs=lookMax(WFS_TABLE[method.code]||WFS_TABLE.MAG,amps);
    out.gas=gas.name[LANG]; out.gasFlow=gas.flow;
    out.filler=fillerLabel(mat,method);
  }
  return out;
}

  sel.innerHTML=ok.map(m=>opt(m.code,m.name[LANG]+' ('+m.iso+')')).join('');
  const pick=ok.find(m=>m.code===prev)||best||ok[0];
  sel.value=pick.code;
  const p=getWeldParams(pick,thick,posKey,matKey,jointKey);
  if(!p){$('paramBox').style.display='none';return;}
  $('paramBox').style.display='block';
  $('paramH').textContent=t.paramH;
  const items=[];
  items.push({k:t.paramAmps,v:rng(p.amps,0.10,5)+' A'});
  if(p.volts!=null)items.push({k:t.paramVolts,v:rng(p.volts,0.08,1)+' V'});
  if(p.polarity)items.push({k:t.paramPol,v:p.polarity});
  if(p.wireDia)items.push({k:t.paramWire,v:'⌀'+p.wireDia+' mm'});
  if(p.elecDia)items.push({k:t.paramElec,v:'⌀'+p.elecDia+' mm'});
  if(p.tungDia)items.push({k:t.paramTung,v:'⌀'+p.tungDia+' mm'});
  if(p.rodDia)items.push({k:t.paramRod,v:'⌀'+p.rodDia+' mm'});
  if(p.wfs)items.push({k:t.paramWfs,v:rng(p.wfs,0.12,0.5)+' m/min'});
  if(p.gas)items.push({k:t.paramGas,v:p.gas});
  if(p.gasFlow)items.push({k:t.paramFlow,v:p.gasFlow+' l/min'});
  items.push({k:t.paramSpeed,v:p.travelMmS+' mm/s ('+p.travelCmMin+' cm/min)'});
  items.push({k:t.paramPasses,v:String(p.passes)});
  if(p.filler)items.push({k:t.paramFiller,v:p.filler});
  if(p.fluxNote)items.push({k:t.paramFlux,v:t.fluxRatio});
  $('paramGrid').innerHTML=items.map(i=>`<div class="param-item"><span>${i.k}</span><b>${i.v}</b></div>`).join('');
  const pos=POSITIONS[posKey];
  $('paramNote').textContent=t.paramNote+(posKey!=='PA'?' '+t.paramNotePos(posKey,pos.n[LANG]):'');
}

function renderWps(feasible,best,ctx){
  const t=T[LANG];
  if(!ctx||!ctx.thick||!best){
    $('wpsSummary').innerHTML=t.wpsEmpty;
    ['wpsPrep','wpsPassesBox','wpsThermal','wpsStepsBox'].forEach(id=>$(id).style.display='none');
    $('wpsCopyBtn').style.display='none'; lastWps=null; return;
  }
  const {thick,pos,matKey,jointKey,len}=ctx;
  const mat=MATERIALS[matKey], joint=JOINTS[jointKey];
  const sel=$('paramMethod'), method=METHODS.find(m=>m.code===sel.value)||best;
  const p=getWeldParams(method,thick,pos,matKey,jointKey);
  const edge=edgePrep(jointKey,thick);
  const passes=passPlan(jointKey,thick);
  const hi=weldHI(method,thick,pos);
  $('wpsSummary').innerHTML=t.wpsSummary(method.name[LANG]+' ISO '+method.iso,joint.n[LANG],mat.name[LANG],thick,pos,len);
  $('wpsPrep').style.display='block';
  $('wpsPrepTxt').innerHTML=t.edgeInfo(edge.edge[LANG],edge.angle,joint.bevel?edge.prep:null);
  $('wpsPassesBox').style.display='block';
  $('wpsPasses').innerHTML=passes.map(type=>{
    const mul=PASS_AMP_MUL[type]||1, amps=p?rng(Math.round(p.amps*mul),0.10,5):'—';
    const v=p?rng(p.volts,0.08,1):'—', spd=p?+(p.travelMmS*((type==='root'?0.9:1))).toFixed(1):'—';
    const tip=t.passTip[type]||'';
    return `<div class="wps-pass"><span class="tag">${passLabel(type)}</span><div class="body">${t.passLine(passLabel(type),amps,v,spd,tip)}</div></div>`;
  }).join('');
  const thermal=[];
  if(mat.interpass) thermal.push(`<div class="ok-item">${t.interpass(mat.interpass)}</div>`);
  if(mat.preheat&&thick>=mat.preheat&&mat.preheatC) thermal.push(`<div class="warn-item">${t.preheatReq(mat.preheatC)}</div>`);
  if(mat.backingGas&&(jointKey==='butt'||jointKey==='pipe')) thermal.push(`<div class="warn-item">${t.backingGas}</div>`);
  if(hi){
    if(mat.hiWin){
      const ok=hi.hi>=mat.hiWin[0]&&hi.hi<=mat.hiWin[1];
      thermal.push(`<div class="${ok?'ok-item':'warn-item'}">HI ${hi.hi} kJ/mm — ${ok?t.hiOk(mat.hiWin[0],mat.hiWin[1]):t.hiWarn(mat.hiWin[0],mat.hiWin[1])}</div>`);
    }else thermal.push(`<div class="ok-item">${t.hiAny(hi.hi)}</div>`);
  }
  if(method.code==='SAW') thermal.push(`<div class="warn-item">${t.sawNote}</div>`);
  $('wpsThermal').style.display=thermal.length?'block':'none';
  $('wpsThermalTxt').innerHTML=thermal.join('');
  $('wpsStepsBox').style.display='block';
  $('wpsSteps').innerHTML=t.prepSteps.map((s,i)=>`<li>${i+1}. ${s}</li>`).join('');
  $('wpsCopyBtn').style.display='block';
  lastWps={method,mat,joint,edge,passes,p,hi,ctx};
}
function buildWpsText(){
  if(!lastWps)return '';
  const t=T[LANG], w=lastWps, p=w.p, ctx=w.ctx;
  const lines=[];
  lines.push('GORWELD® ArcQuote — WPS (SZKIC)');
  lines.push(new Date().toLocaleDateString());
  lines.push('');
  lines.push(w.method.code+' ISO '+w.method.iso+' · '+w.mat.name[LANG]);
  lines.push(w.joint.n[LANG]+' · '+ctx.thick+' mm · '+ctx.pos+' · '+ctx.len+' m');
  lines.push('');
  lines.push(t.wpsPrepH+': '+w.edge.edge[LANG]+(w.edge.angle!=='—'?' · '+w.edge.angle:''));
  if(p){
    lines.push(t.paramAmps+': '+rng(p.amps,0.10,5)+' A · '+t.paramVolts+': '+rng(p.volts,0.08,1)+' V'+(p.polarity?' · '+p.polarity:''));
    if(p.wireDia)lines.push(t.paramWire+': ⌀'+p.wireDia+' mm');
    if(p.elecDia)lines.push(t.paramElec+': ⌀'+p.elecDia+' mm');
    if(p.wfs)lines.push(t.paramWfs+': '+rng(p.wfs,0.12,0.5)+' m/min');
    if(p.gas)lines.push(t.paramGas+': '+p.gas+' · '+p.gasFlow+' l/min');
    lines.push(t.paramSpeed+': '+p.travelMmS+' mm/s');
  }
  lines.push('');
  lines.push(t.wpsPassesH+':');
  w.passes.forEach(type=>{
    const mul=PASS_AMP_MUL[type]||1;
    lines.push('  '+passLabel(type)+': '+(p?rng(Math.round(p.amps*mul),0.10,5):'—')+' A · '+t.passTip[type]);
  });
  if(w.mat.interpass) lines.push(t.interpass(w.mat.interpass));
  if(w.hi) lines.push('HI: '+w.hi.hi+' kJ/mm');
  if(w.method.code==='SAW') lines.push(t.sawNote);
  lines.push('');
  lines.push(t.wpsDisclaimer);
  return lines.join('\n');
}
function copyWps(){
  const txt=buildWpsText();
  if(!txt)return;
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast(T[LANG].toastWps)).catch(()=>fallbackCopy(txt,T[LANG].toastWps));
  else fallbackCopy(txt,T[LANG].toastWps);
}
function weldHI(method,thick,posKey){
  const arc=arcElectrics(method,thick,posKey);
  if(!arc)return null;
  return {hi:arc.hi,amps:arc.amps,volts:arc.volts,travelMmS:arc.travelMmS};
}

function feasibleMethods(mat,thick,pos,jointKey){
  const R=T[LANG].reasons, j=JOINTS[jointKey]||JOINTS.butt;
  return METHODS.map(m=>{
    const reasons=[];
    if(!m.mats.includes(mat))reasons.push(R.material);
    if(thick<m.tmin)reasons.push(R.burn(m.tmin));
    if(thick>m.tmax)reasons.push(R.over(m.tmax));
    if(!m.pos.includes(pos))reasons.push(R.position);
    if(j&&!j.pos.includes(pos))reasons.push(R.joint);
    return {m,ok:!reasons.length,reasons};
  });
}
function pickBest(list,mat,thick,jointKey,workshop){
  const ok=list.filter(x=>x.ok).map(x=>x.m);
  if(!ok.length)return null;
  if(jointKey==='fillet'&&ok.find(m=>m.code==='MAG'))return ok.find(m=>m.code==='MAG');
  if(thick<1.5&&ok.find(m=>m.code==='TIG'))return ok.find(m=>m.code==='TIG');
  if(mat==='aluminium')return ok.find(m=>m.code==='MIG-Al')||ok.find(m=>m.code==='TIG');
  // SAW (łuk kryty) = proces zmechanizowany → auto tylko w WARSZTACIE i dla grubych; u klienta/obiekcie nierealny (tam MAG).
  if(workshop&&thick>10&&jointKey!=='fillet'&&ok.find(m=>m.code==='SAW'))return ok.find(m=>m.code==='SAW');
  return ok.find(m=>m.code==='MAG')||ok.find(m=>m.code==='FCAW')||ok.find(m=>m.code==='MMA')||ok[0];
}

function calc(){
  const t=T[LANG];
  const reg=REGIONS.find(r=>r.id===$('region').value);
  const matKey=$('material').value, mat=MATERIALS[matKey];
  const thick=parseFloat($('thick').value)||0, pos=$('position').value, posF=POSITIONS[pos].f;
  const jointKey=$('joint').value, jointF=JOINTS[jointKey].f;
  const condF=COND[$('cond').value].f, len=parseFloat($('len').value)||0;
  const rate=parseFloat($('rate').value)||0, markup=parseFloat($('markup').value)||1;
  const jm=JOBMODE[$('jobmode').value], km=parseFloat($('km').value)||0;
  $('rateHint').textContent=t.rateHint(reg.name[LANG].split(' ')[0],reg.rate[0],reg.rate[2]);
  const list=feasibleMethods(matKey,thick,pos,jointKey), best=pickBest(list,matKey,thick,jointKey,!jm.travel);
  $('methodBox').className='method-box '+(best?'ok':'bad');
  let mb=best?`<b style="color:var(--cy)">${t.methodSel(best.name[LANG],best.iso)}</b><br>`:`<b style="color:var(--red)">${t.methodBad}</b><br>`;
  mb+=list.map(x=>x.ok?`<span class="chip ok">✓ ${x.m.code}</span>`:`<span class="chip bad" title="${x.reasons.join(', ')}">${x.m.code}</span>`).join('');
  $('methodBox').innerHTML=mb;
  lastFeasible=list; lastBest=best; lastCalcCtx={thick,pos,matKey,jointKey,len};
  renderParams(list,best,thick,pos,matKey,jointKey);
  renderWps(list,best,lastCalcCtx);
  if(!best){calcEmpty(t);return;}

  const tr=thickRow(thick), passes=passPlan(jointKey,thick).length;
  const weldParams=getWeldParams(best,thick,pos,matKey,jointKey);
  const depMassKg=tr[3]*(len*1000)*(mat.dens/1000)/1000;            // masa stopiwa [kg]
  // CZAS wg norm: czas łuku = masa stopiwa / wydajność osadzania; czas całk. = czas łuku / współczynnik czynnościowy
  const slowF=Math.min(posF*mat.diff*condF*jointF,4);               // pozycja/materiał/warunki/złącze spowalniają osadzanie
  const depRate=(DEP_RATE[best.code]||3.0)/slowF;                   // efektywna wydajność osadzania [kg/h]
  const opFactor=OP_FACTOR[best.code]||0.35;                        // współczynnik czynnościowy (duty cycle)
  const arcMin=depRate>0?depMassKg/depRate*60:0;                    // czas łuku [min]
  const weldMin=arcMin/opFactor;                                    // czas spawania całkowity [min]
  const edge=edgePrep(jointKey,thick);
  const bevelMin=(JOINTS[jointKey].bevel?edge.prep:0)*len*(best.code==='SAW'?0.5:1);
  const prepMin=bevelMin+PREP.clean_min_per_m*len+PREP.finish_min_per_m_per_pass*passes*len;
  const totalMin=weldMin+prepMin, weldH=weldMin/60, totalH=totalMin/60;

  const effRate=rate*best.rm*mat.rmult*markup;
  $('effRate').innerHTML=t.charging(effRate.toFixed(0),rate,best.code,best.rm,matKey,mat.rmult,markup);
  const billH=Math.max(totalH,jm.min_h), labor=effRate*billH;

  const fillerKey=best.type==='elec'?mat.elec:(best.type==='flux'?'drut_fluxcored_kg':mat.wire);
  const fillerPrice=(PRICES[fillerKey]||0)*reg.pidx;
  const fillerCost=depMassKg/best.eff*fillerPrice;
  const gasM3=best.gas>0?best.gas*arcMin/1000:0;   // gaz płynie tylko podczas łuku (czas łuku, nie całk.)
  const gasPrice=(PRICES[mat.gas]||0)*reg.pidx, gasCost=gasM3*gasPrice;
  const fluxKg=best.code==='SAW'?depMassKg*FLUX_RATIO:0;            // SAW: topnik zamiast gazu
  const fluxPrice=(PRICES.topnik_SAW_kg||0)*reg.pidx, fluxCost=fluxKg*fluxPrice;
  const finishMin=PREP.finish_min_per_m_per_pass*passes*len;
  const grindMin=bevelMin+finishMin;
  const discCut=len*(thick/3)*PREP.cut_per_m_per_3mm;
  const discGrind=grindMin/PREP.grind_life_min, discFlap=finishMin/PREP.flap_life_min;
  const discCost=(discCut*(PRICES.tarcza_ciecia||0)+discGrind*(PRICES.tarcza_szlif||0)+discFlap*(PRICES.tarcza_listkowa||0))*reg.pidx;

  let travel=0, travelTxt='—';
  if(jm.travel){
    travel=km*2*KM_PLN+(km/DRIVE_KMH*2)*rate*0.5;   // paliwo+amort. + czas jazdy (½ stawki); minimum godzin pokrywa „przyjazd"
    travelTxt=t.travelTxt(km,Math.round(km*2));
  }

  const roundTo=parseFloat($('round').value)||1;
  const vatRate=parseFloat($('vat').value)||0;
  const baseNet=labor+fillerCost+gasCost+fluxCost+discCost+travel;
  // zaokrąglamy kwotę FINALNĄ którą płaci klient (brutto gdy VAT); netto liczymy wstecz
  let netto,vatVal,brutto;
  if(vatRate>0){ brutto=Math.ceil(baseNet*(1+vatRate/100)/roundTo)*roundTo; netto=brutto/(1+vatRate/100); vatVal=brutto-netto; }
  else { netto=Math.ceil(baseNet/roundTo)*roundTo; vatVal=0; brutto=netto; }
  const display=Math.round(vatRate>0?brutto:netto);
  const C=LANG==='pl'?'zł':'PLN';

  $('methodInfo').innerHTML=t.methodInfo(totalH.toFixed(1),weldH.toFixed(1),(prepMin/60).toFixed(1),billH.toFixed(1),jm.min_h,depMassKg.toFixed(2),gasM3.toFixed(2),passes);
  const hi=weldHI(best,thick,pos);
  if(hi){
    let hiHtml=t.hiLine(hi.hi,hi.amps,hi.volts,hi.travelMmS);
    const win=mat.hiWin;                                  // okno heat inputu wymagane dla tej stali (np. S690)
    const outside=win&&(hi.hi<win[0]||hi.hi>win[1]);
    if(win) hiHtml+=`<br><span style="color:${outside?'var(--or)':'var(--grn)'};font-weight:600">${outside?t.hiWarn(win[0],win[1]):t.hiOk(win[0],win[1])}</span>`;
    $('hiLine').className='hi-line'+(outside?' bad':'');
    $('hiLine').style.display='block'; $('hiLine').innerHTML=hiHtml;
  } else { $('hiLine').className='hi-line'; $('hiLine').style.display='none'; }

  $('total').innerHTML=t.totalRender(display,vatRate>0);
  updateSticky(display+' '+C);
  const fair=vatRate>0?brutto:netto;
  const lo=Math.round(fair*0.85/roundTo)*roundTo, hiBand=Math.round(fair*1.20/roundTo)*roundTo;
  $('band').innerHTML=t.band(lo,hiBand,C);

  const rows=[
    {label:t.rowLabor(billH.toFixed(1),effRate.toFixed(0)),val:labor.toFixed(0)},
    {label:t.rowFiller((depMassKg/best.eff).toFixed(2),fillerPrice.toFixed(1)),val:fillerCost.toFixed(0)},
    best.code==='SAW'?{label:t.rowFlux(fluxKg.toFixed(2),fluxPrice.toFixed(1)),val:fluxCost.toFixed(0)}:{label:t.rowGas(gasM3.toFixed(2),gasPrice.toFixed(1)),val:gasCost.toFixed(0)},
    {label:t.rowDiscs(discCut.toFixed(1),discGrind.toFixed(1),discFlap.toFixed(1)),val:discCost.toFixed(0)},
    {label:t.rowTravel(travelTxt),val:travel.toFixed(0)}
  ];
  if(vatRate>0){
    rows.push({label:t.netTotal,val:netto.toFixed(0)},{label:t.vatRow(vatRate),val:vatVal.toFixed(0)},{label:t.gross,val:brutto.toFixed(0),tot:true});
  }else rows.push({label:t.total,val:netto.toFixed(0),tot:true});
  renderBreakdown(rows);

  let warn=mat.preheat&&thick>=mat.preheat?`<div class="warn">${t.preheat(mat.preheat)}</div>`:'';
  $('srcNote').innerHTML=warn+t.srcNote(reg.name[LANG],reg.pidx,roundTo,vatRate);

  lastQuote={
    display,netto:netto.toFixed(0),brutto:brutto.toFixed(0),vatRate,C,method:best.code,
    mat:mat.name[LANG],joint:JOINTS[jointKey].n[LANG],thick,pos,cond:$('cond').value,len,region:reg.name[LANG],
    billH:billH.toFixed(1),lo,hi:hiBand,rows,hiData:hi,weldParams
  };
}

function buildQuoteText(){
  if(!lastQuote)return '';
  const t=T[LANG], q=lastQuote, lines=[];
  lines.push('GORWELD® ArcQuote');
  lines.push((LANG==='pl'?'WYCENA SPAWANIA':'WELDING QUOTE')+' — '+new Date().toLocaleDateString());
  lines.push('');
  lines.push((LANG==='pl'?'Kwota':'Amount')+': '+q.display+' '+q.C+(q.vatRate?' ('+(LANG==='pl'?'brutto':'gross')+')':''));
  lines.push((LANG==='pl'?'Uczciwy przedział':'Fair range')+': '+q.lo+'–'+q.hi+' '+q.C);
  lines.push('');
  lines.push(q.method+' · '+(q.joint?q.joint+' · ':'')+q.mat+' · '+q.thick+' mm · '+q.pos+' · '+q.len+' m');
  lines.push(q.region);
  if(q.hiData)lines.push('HI: '+q.hiData.hi+' kJ/mm · '+q.hiData.amps+' A · '+q.hiData.volts+' V');
  if(q.weldParams){
    const p=q.weldParams, t=T[LANG];
    const bits=[t.paramAmps+': '+rng(p.amps,0.10,5)+' A'];
    if(p.volts!=null)bits.push(t.paramVolts+': '+rng(p.volts,0.08,1)+' V');
    if(p.polarity)bits.push(t.paramPol+': '+p.polarity);
    if(p.wireDia)bits.push(t.paramWire+': ⌀'+p.wireDia+' mm');
    if(p.elecDia)bits.push(t.paramElec+': ⌀'+p.elecDia+' mm');
    if(p.wfs)bits.push(t.paramWfs+': '+rng(p.wfs,0.12,0.5)+' m/min');
    if(p.gas)bits.push(t.paramGas+': '+p.gas+(p.gasFlow?' '+p.gasFlow+' l/min':''));
    bits.push(t.paramSpeed+': '+p.travelMmS+' mm/s');
    lines.push(bits.join(' · '));
  }
  lines.push('');
  q.rows.forEach(r=>lines.push(r.label+': '+r.val+' '+q.C));
  lines.push('');
  lines.push(LANG==='pl'?'Szacunek — nie oferta handlowa.':'Estimate — not a binding offer.');
  return lines.join('\n');
}
function buildFullExport(){
  const q=buildQuoteText();
  const w=buildWpsText();
  if(!q)return '';
  return w?q+'\n\n══════════════\n\n'+w:q;
}
function copyQuote(){
  if(!lastQuote)return;
  const txt=buildQuoteText();
  if(navigator.clipboard)navigator.clipboard.writeText(txt).then(()=>showToast(T[LANG].toastCopy)).catch(()=>fallbackCopy(txt));
  else fallbackCopy(txt);
}
function fallbackCopy(txt,msg){
  const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');showToast(msg||T[LANG].toastCopy);}catch(e){}
  ta.remove();
}
function shareQuote(){
  if(!lastQuote)return;
  const txt=buildFullExport();
  if(navigator.share)navigator.share({title:T[LANG].shareTitle,text:txt}).catch(()=>{});
  else copyQuote();
}
function getHist(){ try{return JSON.parse(localStorage.getItem('gw_quote_hist')||'[]');}catch(e){return [];} }
function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
function fmtHistDate(ts){
  const d=new Date(ts), loc=LANG==='pl'?'pl-PL':'en-GB';
  return d.toLocaleDateString(loc,{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString(loc,{hour:'2-digit',minute:'2-digit'});
}
function histItemHtml(q,i){
  const t=T[LANG], C=q.C||(LANG==='pl'?'zł':'PLN');
  const meta=`${q.method||'?'} · ${esc(q.joint?q.joint+' · ':'')}${esc(q.mat)} · ${q.thick} mm · ${q.pos} · ${q.len} m`;
  return `<div class="hist-item">
    <div class="hist-head">
      <div><div class="hist-amt">${q.display} ${C}</div><div class="hist-meta">${meta}</div><div class="hist-date">${fmtHistDate(q.t)}</div></div>
    </div>
    <div class="hist-actions">
      <button type="button" class="ghost" onclick="this.closest('.hist-item').classList.toggle('open')">${t.histShow}</button>
      <button type="button" onclick="copyHistItem(${i})">📋 ${t.histCopy}</button>
      <button type="button" class="ghost" style="color:var(--red);border-color:var(--red)" onclick="deleteHistItem(${i})" title="${t.histDel}">🗑</button>
    </div>
    <div class="hist-preview">${esc(q.text||'')}</div>
  </div>`;
}
function renderHist(){
  const t=T[LANG], hist=getHist();
  const html=hist.length?hist.map((q,i)=>histItemHtml(q,i)).join(''):`<p class="hint">${t.histEmpty}</p>`;
  if($('histList'))$('histList').innerHTML=html;
  if($('histListMob'))$('histListMob').innerHTML=html;
  const n=hist.length;
  if($('tabHist'))$('tabHist').textContent=t.tabHist+(n?` (${n})`:'');
  if($('histSum'))$('histSum').textContent=t.histSum+(n?` (${n})`:'');
}
function copyHistItem(i){
  const h=getHist()[i]; if(!h||!h.text)return;
  if(navigator.clipboard)navigator.clipboard.writeText(h.text).then(()=>showToast(T[LANG].toastCopy)).catch(()=>fallbackCopy(h.text));
  else fallbackCopy(h.text);
}
function deleteHistItem(i){
  const hist=getHist(); hist.splice(i,1);
  localStorage.setItem('gw_quote_hist',JSON.stringify(hist));
  renderHist(); showToast(T[LANG].toastDel);
}
function clearHist(){
  if(!getHist().length)return;
  if(!confirm(T[LANG].histClear+'?'))return;
  localStorage.removeItem('gw_quote_hist');
  renderHist(); showToast(T[LANG].toastClear);
}
function saveQuote(){
  if(!lastQuote)return;
  const hist=getHist();
  hist.unshift({t:Date.now(),...lastQuote,text:buildFullExport()});
  if(hist.length>30)hist.length=30;
  localStorage.setItem('gw_quote_hist',JSON.stringify(hist));
  renderHist(); showToast(T[LANG].toastSave);
}

function renderPriceEdit(){
  const t=T[LANG],L=t.priceLabels,B=t.badge;
  $('priceEdit').innerHTML=Object.keys(L).map(k=>`
    <div class="price-edit"><span>${L[k]}${PRICES[k]==PRICES_VERIFIED[k]?'<span class="badge">'+B.verified+'</span>':(AUTO[k]!=null&&PRICES[k]==AUTO[k]?'<span class="badge" style="background:rgba(245,158,11,.15);color:var(--or)">'+B.auto+'</span>':'<span class="save">'+B.edited+'</span>')}</span>
    <input type="number" inputmode="decimal" step="0.1" value="${PRICES[k]}" oninput="setPrice('${k}',this.value)"></div>`).join('');
}
function setPrice(k,v){PRICES[k]=parseFloat(v)||0;localStorage.setItem('gw_prices',JSON.stringify(PRICES));renderPriceEdit();calc();}
function resetPrices(){PRICES={...PRICES_VERIFIED,...AUTO};localStorage.setItem('gw_prices',JSON.stringify(PRICES));renderPriceEdit();calc();}

const savedTab=localStorage.getItem('gw_quote_tab');
if(savedTab&&savedTab!=='hist'&&savedTab!=='wps')setTab(savedTab);
else if((savedTab==='hist'||savedTab==='wps')&&window.matchMedia('(max-width:840px)').matches)setTab(savedTab);
syncRange('thick','thickRange','thickVal',' mm');
syncRange('len','lenRange','lenVal',' m');
applyLang();
</script>
