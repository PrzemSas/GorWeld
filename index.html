<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DUMPSTER FORGE - GORWELD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            background: #000;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            color: #fff;
        }

        .container {
            position: relative;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0a0a 0%, #1a0a05 40%, #2a1510 70%, #1a0a0a 100%);
        }

        /* Animated Background */
        .bg-canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Three.js Canvas */
        #scene-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        /* Overlay Effects */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: linear-gradient(
                to bottom,
                rgba(60, 20, 10, 0.3) 0%,
                rgba(20, 20, 20, 0.05) 50%,
                rgba(0, 0, 0, 0.7) 100%
            );
            z-index: 5;
        }

        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(
                ellipse at center,
                transparent 10%,
                rgba(0, 0, 0, 0.4) 70%,
                rgba(0, 0, 0, 0.8) 100%
            );
            pointer-events: none;
            z-index: 4;
        }

        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.08),
                rgba(0, 0, 0, 0.08) 1px,
                transparent 1px,
                transparent 2px
            );
            pointer-events: none;
            z-index: 6;
        }

        .flicker {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 100, 50, 0.02);
            pointer-events: none;
            z-index: 6;
            animation: flicker 0.15s infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0; }
            50% { opacity: 1; }
        }

        /* Title */
        .title {
            position: absolute;
            top: 50px;
            left: 50px;
            font-size: 64px;
            font-weight: bold;
            color: #ff6633;
            letter-spacing: 4px;
            text-shadow: 
                0 0 10px #ff6633,
                0 0 20px #ff4422,
                0 0 40px #ff2200,
                0 0 80px rgba(255, 100, 50, 0.5),
                0 8px 16px rgba(0, 0, 0, 0.9);
            font-family: Georgia, serif;
            z-index: 10;
            animation: titlePulse 2s ease-in-out infinite;
        }

        @keyframes titlePulse {
            0%, 100% { 
                text-shadow: 
                    0 0 10px #ff6633,
                    0 0 20px #ff4422,
                    0 0 40px #ff2200,
                    0 0 80px rgba(255, 100, 50, 0.5),
                    0 8px 16px rgba(0, 0, 0, 0.9);
            }
            50% { 
                text-shadow: 
                    0 0 20px #ff8833,
                    0 0 40px #ff6633,
                    0 0 60px #ff4422,
                    0 0 100px rgba(255, 100, 50, 0.7),
                    0 8px 16px rgba(0, 0, 0, 0.9);
            }
        }

        .subtitle {
            position: absolute;
            top: 140px;
            left: 50px;
            font-size: 12px;
            color: #ff8844;
            letter-spacing: 2px;
            line-height: 2.2;
            font-family: monospace;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255, 100, 50, 0.6);
        }

        /* HUD Elements */
        .hud-top-right {
            position: absolute;
            top: 50px;
            right: 50px;
            font-size: 11px;
            color: #00ff44;
            letter-spacing: 1px;
            line-height: 2;
            font-family: monospace;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 68, 0.6);
            border: 1px solid #00ff44;
            padding: 15px;
            background: rgba(0, 255, 68, 0.05);
        }

        .hud-bottom-right {
            position: absolute;
            bottom: 50px;
            right: 50px;
            font-size: 10px;
            color: #00ff44;
            letter-spacing: 1px;
            line-height: 1.8;
            font-family: monospace;
            z-index: 10;
            text-shadow: 0 0 10px rgba(0, 255, 68, 0.6);
            border: 1px solid #00ff44;
            padding: 12px;
            background: rgba(0, 255, 68, 0.05);
            max-width: 240px;
        }

        .hud-bottom-right span {
            color: #ff6633;
        }

        /* Controls */
        .controls {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
            align-items: center;
            z-index: 20;
            animation: slideUpHeavy 0.8s ease-out;
        }

        @keyframes slideUpHeavy {
            from {
                opacity: 0;
                transform: translateX(-50%) translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateX(-50%) translateY(0);
            }
        }

        .play-btn {
            padding: 14px 32px;
            background: linear-gradient(135deg, #ff6633 0%, #ff3311 100%);
            color: #fff;
            border: 2px solid #ff2200;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 0px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: monospace;
            transition: all 0.2s ease;
            box-shadow: 
                0 0 20px rgba(255, 100, 50, 0.5),
                0 0 40px rgba(255, 50, 30, 0.3),
                inset 0 0 10px rgba(255, 255, 255, 0.2),
                0 12px 30px rgba(0, 0, 0, 0.8);
        }

        .play-btn:hover {
            background: linear-gradient(135deg, #ff8844 0%, #ff5533 100%);
            box-shadow: 
                0 0 30px rgba(255, 150, 80, 0.7),
                0 0 60px rgba(255, 100, 50, 0.5),
                inset 0 0 15px rgba(255, 255, 255, 0.3),
                0 16px 40px rgba(0, 0, 0, 0.9);
            transform: scale(1.08);
        }

        .play-btn:active {
            transform: scale(0.95);
            box-shadow: 
                0 0 20px rgba(255, 100, 50, 0.5),
                0 0 40px rgba(255, 50, 30, 0.3),
                inset 0 0 20px rgba(0, 0, 0, 0.5),
                0 4px 10px rgba(0, 0, 0, 0.8);
        }

        .timeline-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .timeline {
            width: 280px;
            height: 6px;
            background: #1a1a1a;
            border-radius: 0px;
            overflow: hidden;
            border: 1px solid #ff6633;
            box-shadow: 
                inset 0 0 10px rgba(0, 0, 0, 0.8),
                0 0 15px rgba(255, 100, 50, 0.3);
        }

        .timeline-progress {
            height: 100%;
            background: linear-gradient(90deg, #ff6633 0%, #ff8844 50%, #ffaa55 100%);
            width: 0%;
            transition: width 0.05s linear;
            box-shadow: 0 0 15px rgba(255, 100, 50, 0.8);
        }

        .time-display {
            color: #ff6633;
            font-size: 13px;
            font-family: monospace;
            letter-spacing: 1px;
            min-width: 60px;
            text-align: right;
            text-shadow: 0 0 10px rgba(255, 100, 50, 0.6);
            font-weight: bold;
        }

        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 15;
            color: #ff6633;
        }

        .loader {
            border: 4px solid #444;
            border-top: 4px solid #ff6633;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spinLoader 1s linear infinite;
            margin: 0 auto 30px;
            box-shadow: 0 0 20px rgba(255, 100, 50, 0.5);
        }

        @keyframes spinLoader {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 100, 50, 0.6);
        }

        /* Particle Effects */
        .particle {
            position: absolute;
            pointer-events: none;
        }

        .spark {
            width: 3px;
            height: 3px;
            background: #ff6633;
            box-shadow: 0 0 8px #ff6633;
            border-radius: 50%;
        }

        .error {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(200, 50, 50, 0.3);
            padding: 50px;
            border: 2px solid #ff4444;
            border-radius: 0px;
            color: #ff8844;
            z-index: 15;
            max-width: 500px;
            box-shadow: 0 0 40px rgba(255, 50, 50, 0.4);
            font-size: 14px;
            line-height: 2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="bg-canvas-container">
            <canvas id="bg-canvas"></canvas>
        </div>

        <canvas id="scene-canvas"></canvas>

        <div class="overlay"></div>
        <div class="vignette"></div>
        <div class="scanlines"></div>
        <div class="flicker"></div>

        <div class="title">DUMPSTER FORGE</div>
        <div class="subtitle">
            GORWELD INDUSTRIES<br>
            POST-APOCALYPTIC SCRAPYARD<br>
            INDUSTRIAL THERMAL DESIGN
        </div>

        <div class="hud-top-right">
            <div>SYSTEM: <span>ONLINE</span></div>
            <div>RESOLUTION: <span>8K</span></div>
            <div>FPS: <span id="fps">24</span></div>
        </div>

        <div class="loading" id="loading">
            <div class="loader"></div>
            <div class="loading-text">INITIALIZING DUMPSTER FORGE...</div>
        </div>

        <div class="controls" id="controls" style="opacity: 0; pointer-events: none;">
            <button class="play-btn" id="playBtn">▶ IGNITE FORGE</button>
            <div class="timeline-container">
                <div class="timeline">
                    <div class="timeline-progress" id="progress"></div>
                </div>
                <div class="time-display" id="timeDisplay">0.0s</div>
            </div>
        </div>

        <div class="hud-bottom-right">
            <div>CHAMBER: <span>16mm Dia</span></div>
            <div>FRAME: <span>I-BEAM 300mm</span></div>
            <div>INSULATION: <span>DOUBLE LAYER</span></div>
            <div>HEAT SHIELD: <span>REINFORCED</span></div>
            <div style="margin-top: 10px; border-top: 1px solid #00ff44; padding-top: 10px;">
                <div>FORGE STATUS: <span id="forgeStatus">STANDBY</span></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Epic Background Canvas
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let animationTime = 0;

        function resizeCanvas() {
            bgCanvas.width = window.innerWidth;
            bgCanvas.height = window.innerHeight;
        }
        resizeCanvas();

        function drawBackground() {
            // Dark apocalyptic sky
            const skyGrad = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
            skyGrad.addColorStop(0, '#0a0505');
            skyGrad.addColorStop(0.3, '#1a0a05');
            skyGrad.addColorStop(0.6, '#2a1510');
            skyGrad.addColorStop(1, '#0a0a0a');
            bgCtx.fillStyle = skyGrad;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Massive crane silhouettes
            drawCranes();

            // Refinery towers
            drawTowers();

            // Industrial structures
            drawStructures();

            // Fire and glow effects
            drawFireGlow();

            // Dust and atmosphere
            drawAtmosphere();

            // Animated lightning/sparks
            drawSparks();
        }

        function drawCranes() {
            bgCtx.fillStyle = 'rgba(40, 30, 20, 0.6)';
            
            // Left crane - massive
            bgCtx.beginPath();
            bgCtx.moveTo(80, bgCanvas.height * 0.5);
            bgCtx.lineTo(200, 50);
            bgCtx.lineTo(240, 50);
            bgCtx.lineTo(120, bgCanvas.height * 0.5);
            bgCtx.fill();

            // Crane cable
            bgCtx.strokeStyle = 'rgba(100, 100, 100, 0.4)';
            bgCtx.lineWidth = 3;
            bgCtx.beginPath();
            bgCtx.moveTo(220, 50);
            bgCtx.lineTo(220, bgCanvas.height * 0.4);
            bgCtx.stroke();

            // Right crane
            bgCtx.fillStyle = 'rgba(40, 30, 20, 0.5)';
            bgCtx.beginPath();
            bgCtx.moveTo(bgCanvas.width - 80, bgCanvas.height * 0.45);
            bgCtx.lineTo(bgCanvas.width - 180, 80);
            bgCtx.lineTo(bgCanvas.width - 220, 80);
            bgCtx.lineTo(bgCanvas.width - 120, bgCanvas.height * 0.45);
            bgCtx.fill();

            // Right crane cable
            bgCtx.strokeStyle = 'rgba(100, 100, 100, 0.3)';
            bgCtx.beginPath();
            bgCtx.moveTo(bgCanvas.width - 200, 80);
            bgCtx.lineTo(bgCanvas.width - 200, bgCanvas.height * 0.35);
            bgCtx.stroke();
        }

        function drawTowers() {
            bgCtx.fillStyle = 'rgba(60, 40, 30, 0.7)';
            
            // Center refinery tower
            bgCtx.fillRect(bgCanvas.width / 2 - 60, 60, 120, bgCanvas.height * 0.65);

            // Tower segments
            bgCtx.fillStyle = 'rgba(40, 30, 20, 0.5)';
            for (let i = 0; i < 8; i++) {
                bgCtx.fillRect(bgCanvas.width / 2 - 65, 60 + i * 80, 130, 10);
            }

            // Side towers
            bgCtx.fillStyle = 'rgba(50, 35, 25, 0.6)';
            bgCtx.fillRect(bgCanvas.width * 0.25 - 40, 120, 80, bgCanvas.height * 0.55);
            bgCtx.fillRect(bgCanvas.width * 0.75 - 40, 100, 80, bgCanvas.height * 0.57);
        }

        function drawStructures() {
            bgCtx.fillStyle = 'rgba(35, 25, 15, 0.7)';

            // Collapsed beams
            for (let i = 0; i < 6; i++) {
                bgCtx.save();
                bgCtx.translate(bgCanvas.width * (0.15 + i * 0.13), bgCanvas.height * 0.55);
                bgCtx.rotate(0.3 + Math.sin(animationTime * 0.001) * 0.1 + i * 0.15);
                bgCtx.fillRect(-60, -15, 200, 30);
                bgCtx.restore();
            }

            // Scrap piles
            bgCtx.fillStyle = 'rgba(50, 35, 20, 0.6)';
            const piles = [
                { x: 200, y: bgCanvas.height * 0.65, w: 150, h: 80 },
                { x: bgCanvas.width - 300, y: bgCanvas.height * 0.68, w: 180, h: 90 },
                { x: bgCanvas.width * 0.4, y: bgCanvas.height * 0.72, w: 120, h: 70 }
            ];

            piles.forEach(pile => {
                bgCtx.fillRect(pile.x, pile.y, pile.w, pile.h);
            });
        }

        function drawFireGlow() {
            // Main forge glow - center bottom
            const fireGrad = bgCtx.createRadialGradient(
                bgCanvas.width / 2, bgCanvas.height * 0.75, 0,
                bgCanvas.width / 2, bgCanvas.height * 0.75, bgCanvas.width * 0.6
            );
            fireGrad.addColorStop(0, 'rgba(255, 180, 100, 0.4)');
            fireGrad.addColorStop(0.3, 'rgba(255, 120, 60, 0.25)');
            fireGrad.addColorStop(0.7, 'rgba(255, 80, 40, 0.1)');
            fireGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
            bgCtx.fillStyle = fireGrad;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Pulsing red glow
            const pulse = 0.5 + Math.sin(animationTime * 0.003) * 0.5;
            const redGlow = bgCtx.createRadialGradient(
                bgCanvas.width / 2, bgCanvas.height * 0.75, 0,
                bgCanvas.width / 2, bgCanvas.height * 0.75, bgCanvas.width * 0.5
            );
            redGlow.addColorStop(0, `rgba(255, 50, 30, ${0.2 * pulse})`);
            redGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
            bgCtx.fillStyle = redGlow;
            bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

            // Side glows
            [0.2, 0.8].forEach(xPos => {
                const sideGlow = bgCtx.createRadialGradient(
                    bgCanvas.width * xPos, bgCanvas.height * 0.5, 0,
                    bgCanvas.width * xPos, bgCanvas.height * 0.5, 300
                );
                sideGlow.addColorStop(0, 'rgba(255, 150, 80, 0.15)');
                sideGlow.addColorStop(1, 'rgba(0, 0, 0, 0)');
                bgCtx.fillStyle = sideGlow;
                bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);
            });
        }

        function drawAtmosphere() {
            // Heavy fog layers
            bgCtx.fillStyle = 'rgba(30, 15, 10, 0.3)';
            bgCtx.fillRect(0, bgCanvas.height * 0.65, bgCanvas.width, bgCanvas.height * 0.35);

            bgCtx.fillStyle = 'rgba(20, 10, 5, 0.2)';
            for (let i = 0; i < 5; i++) {
                bgCtx.fillRect(0, bgCanvas.height * (0.55 + i * 0.06), bgCanvas.width, 30);
            }

            // Dust particles
            bgCtx.fillStyle = 'rgba(150, 120, 100, 0.06)';
            for (let i = 0; i < 200; i++) {
                const x = Math.random() * bgCanvas.width;
                const y = Math.random() * bgCanvas.height;
                const size = Math.random() * 2.5 + 0.5;
                bgCtx.fillRect(x, y, size, size);
            }
        }

        function drawSparks() {
            // Animated sparks from forge
            bgCtx.fillStyle = 'rgba(255, 150, 80, 0.8)';
            
            for (let i = 0; i < 20; i++) {
                const angle = (animationTime * 0.005 + i * (Math.PI * 2 / 20)) % (Math.PI * 2);
                const dist = 150 + Math.sin(animationTime * 0.004 + i) * 80;
                const x = bgCanvas.width / 2 + Math.cos(angle) * dist;
                const y = bgCanvas.height * 0.75 + Math.sin(angle) * dist * 0.5;
                
                bgCtx.fillRect(x - 2, y - 2, 4, 4);
                bgCtx.shadowColor = 'rgba(255, 100, 50, 0.6)';
                bgCtx.shadowBlur = 10;
            }
            bgCtx.shadowBlur = 0;
        }

        function animateBackground() {
            animationTime++;
            drawBackground();
            requestAnimationFrame(animateBackground);
        }
        animateBackground();

        window.addEventListener('resize', resizeCanvas);

        // Three.js Scene
        let scene, camera, renderer;
        let playState = false;
        let frameCount = 0;
        const targetDuration = 15000;
        const fps = 24;
        const frameDuration = 1000 / fps;
        let initialized = false;
        let sceneObjects = {};

        const sceneCanvas = document.getElementById('scene-canvas');
        const playBtn = document.getElementById('playBtn');
        const progress = document.getElementById('progress');
        const timeDisplay = document.getElementById('timeDisplay');
        const loading = document.getElementById('loading');
        const controls = document.getElementById('controls');
        const forgeStatus = document.getElementById('forgeStatus');

        function initScene() {
            try {
                const gl = sceneCanvas.getContext('webgl') || sceneCanvas.getContext('webgl2');
                if (!gl) throw new Error('WebGL not supported');

                scene = new THREE.Scene();
                scene.background = new THREE.Color(0x000000);
                scene.fog = new THREE.Fog(0x1a1a1a, 120, 350);

                camera = new THREE.PerspectiveCamera(
                    50,
                    window.innerWidth / window.innerHeight,
                    0.1,
                    1000
                );
                camera.position.set(20, 25, 40);

                renderer = new THREE.WebGLRenderer({ 
                    canvas: sceneCanvas,
                    antialias: true,
                    alpha: true,
                    powerPreference: 'high-performance'
                });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1));
                renderer.shadowMap.enabled = true;
                renderer.outputColorSpace = THREE.SRGBColorSpace;

                // Lights
                const ambientLight = new THREE.AmbientLight(0x333333, 0.6);
                scene.add(ambientLight);

                const directionalLight = new THREE.DirectionalLight(0xffffff, 1.2);
                directionalLight.position.set(60, 80, 50);
                directionalLight.castShadow = true;
                directionalLight.shadow.mapSize.width = 1024;
                directionalLight.shadow.mapSize.height = 1024;
                scene.add(directionalLight);

                const forgeLight = new THREE.PointLight(0xff6633, 0, 80);
                forgeLight.position.set(0, 8, 0);
                scene.add(forgeLight);
                sceneObjects.forgeLight = forgeLight;

                // Ground
                const groundGeometry = new THREE.PlaneGeometry(200, 200);
                const groundMaterial = new THREE.MeshStandardMaterial({
                    color: 0x2a2a2a,
                    roughness: 0.95,
                    metalness: 0
                });
                const ground = new THREE.Mesh(groundGeometry, groundMaterial);
                ground.rotation.x = -Math.PI / 2;
                scene.add(ground);

                // Base Frame
                const beamGeom = new THREE.BoxGeometry(50, 2.5, 50);
                const beamMaterial = new THREE.MeshStandardMaterial({
                    color: 0x3a3a3a,
                    roughness: 0.3,
                    metalness: 0.9
                });
                const beam = new THREE.Mesh(beamGeom, beamMaterial);
                beam.position.y = 0.5;
                scene.add(beam);

                // Chamber
                const chamberGeometry = new THREE.CylinderGeometry(12, 12, 16, 32);
                const chamberMaterial = new THREE.MeshStandardMaterial({
                    color: 0x1a1a1a,
                    roughness: 0.4,
                    metalness: 0.8,
                    emissive: 0x443322,
                    emissiveIntensity: 0.3
                });
                const chamber = new THREE.Mesh(chamberGeometry, chamberMaterial);
                chamber.position.y = 10;
                scene.add(chamber);

                // Door
                const doorGeometry = new THREE.BoxGeometry(10, 10, 0.8);
                const doorMaterial = new THREE.MeshStandardMaterial({
                    color: 0x0a0a0a,
                    roughness: 0.3,
                    metalness: 0.95,
                    emissive: 0x663322
                });
                const door = new THREE.Mesh(doorGeometry, doorMaterial);
                door.position.set(-12.5, 10, 0);
                scene.add(door);
                sceneObjects.door = door;
                sceneObjects.doorMaterial = doorMaterial;

                // Particles
                const particleCount = 150;
                const positions = new Float32Array(particleCount * 3);
                const velocities = [];

                for (let i = 0; i < particleCount; i++) {
                    positions[i * 3] = (Math.random() - 0.5) * 30;
                    positions[i * 3 + 1] = 8 + Math.random() * 15;
                    positions[i * 3 + 2] = (Math.random() - 0.5) * 30;

                    velocities.push({
                        x: (Math.random() - 0.5) * 0.15,
                        y: 0.05 + Math.random() * 0.1,
                        z: (Math.random() - 0.5) * 0.15,
                        life: 0,
                        lifespan: 100 + Math.random() * 200
                    });
                }

                const particleGeometry = new THREE.BufferGeometry();
                particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

                const particleMaterial = new THREE.PointsMaterial({
                    color: 0xff8844,
                    size: 0.3,
                    transparent: true,
                    opacity: 0.6
                });

                const particles = new THREE.Points(particleGeometry, particleMaterial);
                scene.add(particles);
                sceneObjects.particles = { points: particles, geometry: particleGeometry, velocities, count: particleCount };

                initialized = true;
                loading.style.opacity = '0';
                loading.style.pointerEvents = 'none';
                controls.style.opacity = '1';
                controls.style.pointerEvents = 'auto';

                return true;
            } catch (error) {
                console.error('Error:', error);
                loading.innerHTML = `<div class="error">⚠ INITIALIZATION FAILED<br>${error.message}</div>`;
                return false;
            }
        }

        function updateAnimation() {
            if (!playState || !initialized) return;

            frameCount += frameDuration;
            if (frameCount > targetDuration) frameCount = 0;

            const t = frameCount / targetDuration;
            progress.style.width = (t * 100) + '%';
            timeDisplay.textContent = (t * 15).toFixed(1) + 's';

            // Camera
            if (t < 0.2) {
                camera.position.y = 25 - (t / 0.2) * 8;
                camera.position.z = 40 + (t / 0.2) * 20;
            } else if (t < 0.6) {
                camera.position.z = 60 - ((t - 0.2) / 0.4) * 30;
            } else {
                const zoomT = (t - 0.6) / 0.4;
                camera.position.z = 30 - zoomT * 20;
                camera.position.y = 17 + zoomT * 8;
            }
            camera.lookAt(0, 10, 0);

            // Forge glow
            const glowIntensity = 2 + Math.sin(t * Math.PI * 4) * 1.5;
            sceneObjects.forgeLight.intensity = glowIntensity;
            sceneObjects.doorMaterial.emissiveIntensity = 0.3 + Math.sin(t * Math.PI * 3) * 0.4;

            // Door animation
            if (t > 0.7) {
                const doorT = (t - 0.7) / 0.3;
                sceneObjects.door.position.x = -12.5 + doorT * 5;
            }

            // Particles
            if (sceneObjects.particles) {
                const positions = sceneObjects.particles.geometry.attributes.position.array;
                for (let i = 0; i < sceneObjects.particles.count; i++) {
                    const vel = sceneObjects.particles.velocities[i];
                    vel.life += 1;

                    if (vel.life > vel.lifespan) {
                        vel.life = 0;
                        positions[i * 3] = (Math.random() - 0.5) * 25;
                        positions[i * 3 + 1] = 8 + Math.random() * 12;
                        positions[i * 3 + 2] = (Math.random() - 0.5) * 25;
                    } else {
                        positions[i * 3] += vel.x;
                        positions[i * 3 + 1] += vel.y;
                        positions[i * 3 + 2] += vel.z;
                    }
                }
                sceneObjects.particles.geometry.attributes.position.needsUpdate = true;
            }

            forgeStatus.textContent = playState ? 'BURNING' : 'STANDBY';
        }

        function animate() {
            requestAnimationFrame(animate);
            if (initialized) {
                updateAnimation();
                renderer.render(scene, camera);
            }
        }

        playBtn.addEventListener('click', () => {
            if (initialized) {
                playState = !playState;
                playBtn.textContent = playState ? '⏸ SHUTDOWN' : '▶ IGNITE FORGE';
            }
        });

        window.addEventListener('resize', () => {
            if (initialized) {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        });

        setTimeout(() => {
            initScene();
            animate();
        }, 300);
    </script>
</body>
</html>
